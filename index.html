function uploadToImgBB(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64Image = e.target.result.split(',')[1];
      var formData = new FormData();
      formData.append('image', base64Image);
      fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, { method: 'POST', body: formData })
      .then(response => response.json())
      .then(data => { if (data.success) { resolve(data.data.url); } else { reject(new Error('Upload failed')); } })
      .catch(error => reject(error));
    };
    reader.readAsDataURL(file);
  });
}

reg-address" required minlength="10" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 text-gray-900 bg-gray-50" placeholder="শহর, জেলা"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড <span class="text-red-500">*</span></label><input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 text-gray-900 bg-gray-50" placeholder="কমপক্ষে ৬ অক্ষর"></div><div><label class="block text-sm font-medium text-gray-700 mb-1">পাসওয়ার্ড নিশ্চিত <span class="text-red-500">*</span></label><input type="password" id="reg-confirm" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 text-gray-900 bg-gray-50" placeholder="আবার লিখুন"></div></div><button type="button" onclick="doRegister()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">রেজিস্টার করুন →</button></div><p class="text-center text-sm text-gray-600 mt-6">ইতিমধ্যে অ্যাকাউন্ট আছে? <button type="button" onclick="state.currentView=\'login\';renderApp();" class="text-indigo-600 hover:underline font-semibold">লগইন করুন</button></p></div></div></div>'; }

function doRegister() { try { var name = document.getElementById('reg-name').value.trim(); var email = document.getElementById('reg-email').value.trim(); var phone = document.getElementById('reg-phone').value.trim(); var address = document.getElementById('reg-address').value.trim(); var password = document.getElementById('reg-password').value; var confirm = document.getElementById('reg-confirm').value; if (!name || !email || !phone || !address) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; } if (name.length < 3) { showToast('নাম কমপক্ষে ৩ অক্ষর হতে হবে!', 'error'); return; } if (!phone.match(/^01[3-9]\d{8}$/)) { showToast('সঠিক মোবাইল নম্বর দিন (01XXXXXXXXX)!', 'error'); return; } if (password !== confirm) { showToast('পাসওয়ার্ড মিলছে না!', 'error'); return; } if (password.length < 6) { showToast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error'); return; } if (DEFAULT_DATA.users.find(function(u) { return u && u.email === email; })) { showToast('এই ইমেইল ইতিমধ্যে ব্যবহৃত!', 'error'); return; } var newUser = { id: Date.now(), name: name, email: email, phone: phone, username: email.split('@')[0], password: password, role: 'Customer', balance: 0, verified: false, shopName: '', address: address, createdAt: new Date().toISOString().split('T')[0], credits: 100, subscribed: false }; database.ref('users/' + newUser.id).set(newUser).then(() => { state.currentUser = newUser; state.currentView = 'dashboard'; state.dashboardView = 'home'; saveData(); showToast('রেজিস্ট্রেশন সফল! স্বাগতম ' + name, 'success'); renderApp(); }).catch(err => { showToast('এরর: ' + err.message, 'error'); }); } catch(e) { showToast('রেজিস্ট্রেশন error: ' + e.message, 'error'); } }

function renderBottomNav() {
  var u = state.currentUser;
  var isAdmin = (u.role === 'CEO' || u.role === 'Admin');
  var cartCount = state.cart.length;
  var unreadNotifs = DEFAULT_DATA.notifications.filter(function(n) { return n && n.userId === u.id && !n.read; }).length;
  
  var items = [
    { id: 'home', icon: 'fa-home', label: 'হোম', badge: 0 },
    { id: 'products', icon: 'fa-box', label: 'প্রোডাক্ট', badge: 0 },
    { id: 'cart', icon: 'fa-shopping-cart', label: 'কার্ট', badge: cartCount },
    { id: 'orders', icon: 'fa-clipboard-list', label: 'অর্ডার', badge: 0 },
    { id: 'wallet', icon: 'fa-wallet', label: 'ওয়ালেট', badge: 0 },
    { id: 'profile', icon: 'fa-user', label: 'প্রোফাইল', badge: 0 }
  ];
  
  if (isAdmin) {
    items.push({ id: 'admin', icon: 'fa-cog', label: 'অ্যাডমিন', badge: 0 });
  }
  
  var html = '<nav class="bottom-nav md:hidden">';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var activeClass = state.dashboardView === item.id ? 'active' : '';
    html += '<button type="button" onclick="switchDashboardView(\'' + item.id + '\')" class="bottom-nav-item ' + activeClass + '">';
    html += '<i class="fas ' + item.icon + ' nav-icon"></i>';
    html += '<span>' + item.label + '</span>';
    if (item.badge > 0) {
      html += '<span class="bottom-nav-badge">' + item.badge + '</span>';
    }
    html += '</button>';
  }
  html += '</nav>';

function renderDashProductCard(p) { if (!p) return ''; var discount = Math.round((1 - p.price / p.originalPrice) * 100); var inWishlist = state.wishlist.indexOf(p.id) !== -1; var inCart = state.cart.find(function(c) { return c.id === p.id; }); var hasVideo = p.video ? true : false; var html = '<div class="product-card"><div class="relative"><img src="' + (p.image || 'https://via.placeholder.com/300x200?text=No+Image') + '" class="w-full h-48 object-cover" onerror="this.src=\'https://via.placeholder.com/300x200?text=No+Image\'">'; if (discount > 0) html += '<span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded font-bold">' + discount + '% OFF</span>'; if (hasVideo) html += '<span class="absolute top-2 right-12 bg-purple-500 text-white text-xs px-2 py-1 rounded font-bold">🎬 ভিডিও</span>'; html += '<button type="button" onclick="toggleWishlist(' + p.id + ')" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow">' + (inWishlist ? '❤️' : '🤍') + '</button></div><div class="p-4"><p class="text-xs text-gray-500 mb-1">' + (p.category || '') + '</p><h3 class="font-semibold text-gray-900 truncate mb-2">' + (p.name || '') + '</h3><div class="flex items-center gap-2 mb-2"><span class="text-lg font-bold text-indigo-600">৳' + (p.price || 0) + '</span><span class="text-sm text-gray-400 line-through">' + (p.originalPrice || 0) + '</span></div><p class="text-xs text-green-600 mb-3">স্টক: ' + (p.stock || 0) + '</p><div class="flex gap-2 mb-2">'; if (p.image && p.downloadable !== false) html += '<button type="button" onclick="downloadFile(\'' + p.image + '\', \'' + (p.name || 'image').replace(/[^a-zA-Z0-9]/g, '_') + '.jpg\')" class="flex-1 text-xs bg-blue-100 text-blue-700 px-2 py-1.5 rounded hover:bg-blue-200 font-medium">📥 ছবি</button>'; if (p.video && p.downloadable !== false) html += '<button type="button" onclick="downloadFile(\'' + p.video + '\', \'' + (p.name || 'video').replace(/[^a-zA-Z0-9]/g, '_') + '.mp4\')" class="flex-1 text-xs bg-pur function renderDashCart() { if (state.cart.length === 0) return '<div class="text-center py-12 fade-in"><p class="text-gray-500 text-lg mb-4">কার্ট খালি</p><button type="button" onclick="switchDashboardView(\'products\')" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium">প্রোডাক্ট দেখুন</button></div>'; var subtotal = 0; var itemsHtml = ''; for (var i = 0; i < state.cart.length; i++) { var c = state.cart[i]; var p = DEFAULT_DATA.products.find(function(x) { return x && x.id === c.id; }); if (!p) continue; subtotal += p.price * c.qty; itemsHtml += '<div class="bg-white rounded-xl p-4 shadow-sm flex gap-4 border border-gray-100"><img src="' + (p.image || '') + '" class="w-24 h-24 object-cover rounded-lg"><div class="flex-1"><h3 class="font-semibold text-gray-900">' + (p.name || '') + '</h3><p class="text-sm text-gray-500 mb-2">৳' + (p.price || 0) + '</p><div class="flex items-center gap-2"><button type="button" onclick="updateCartQty(' + p.id + ',-1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">-</button><span class="font-bold w-8 text-center">' + c.qty + '</span><button type="button" onclick="updateCartQty(' + p.id + ',1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">+</button><button type="button" onclick="removeFromCart(' + p.id + ')" class="ml-auto text-red-500">🗑️</button></div></div><div class="font-bold text-indigo-600 flex items-center">৳' + (p.price * c.qty) + '</div></div>'; } var shipping = 60; var total = subtotal + shipping; return '<div class="fade-in"><h2 class="text-2xl font-bold mb-6 text-gray-900">শপিং কার্ট</h2><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2 space-y-3">' + itemsHtml + '</div><div class="bg-white rounded-xl p-6 shadow-sm h-fit border border-gray-100"><h3 class="font-bold text-lg mb-4 text-gray-900">অর্ডার সামারি</h3><div class="space-y-2 text-sm text-gray-700"><div class="flex justify-between"><span>সাবটোটাল</span><span>৳' + subtotal + '</span></div><div class="flex justify-between function showAdminTab(tabName) { 
  var tabs = ['users', 'products', 'orders', 'subscriptions', 'withdrawals', 'broadcast', 'eom']; 
  for (var i = 0; i < tabs.length; i++) { 
    var el = document.getElementById('admin-tab-' + tabs[i]); 
    var btn = document.getElementById('tab-' + tabs[i]); 
    if (el) { 
      if (tabs[i] === tabName) { 
        el.classList.remove('hidden'); 
        btn.className = 'px-4 py-2 rounded-t-lg font-medium bg-indigo-600 text-white whitespace-nowrap'; 
      } else { 
        el.classList.add('hidden'); 
        btn.className = 'px-4 py-2 rounded-t-lg font-medium bg-gray-200 text-gray-700 whitespace-nowrap'; 
      } 
    } 
  } 
}

function declareEOM() {
  var userId = parseInt(document.getElementById('eom-user-select').value);
  if (!userId) { showToast('অনুগ্রহ করে একজন রিসেলার নির্বাচন করুন!', 'error'); return; }
  if (!confirm('আপনি কি নিশ্চিত যে এই রিসেলারকে মাসের সেরা ঘোষণা করে ৳৩০০ বোনাস দিতে চান?')) return;
  var user = DEFAULT_DATA.users.find(function(u) { return u && u.id === userId; });
  if (!user) { showToast('ইউজার খুঁজে পাওয়া যায়নি!', 'error'); return; }
  var bonusAmount = 300;
  var newBalance = (user.balance || 0) + bonusAmount;
  var currentMonth = new Date().toLocaleDateString('bn-BD', { month: 'long', year: 'numeric' });
  showToast('প্রসেসিং হচ্ছে...', 'info');
  database.ref('users/' + userId).update({ balance: newBalance }).then(function() {
    var txnId = Date.now();
    var txn = { id: txnId, userId: userId, type: 'EOM Bonus', amount: bonusAmount, date: new Date().toLocaleDateString('bn-BD'), description: '🏆 মাসের সেরা রিসেলার বোনাস (' + currentMonth + ')' };
    return database.ref('transactions/' + txnId).set(txn);
  }).then(function() {
    var eomData = { userId: userId, userName: user.name, month: currentMonth, bonus: bonusAmount, date: new Date().toISOString() };
    return database.ref('eom').set(eomData);
  }).then(function() {
    addNotification(userId, '🎉 অভিনন্দন! আপনি এই মাসের সেরা রিসেলার নির্বাচিত হয়েছেন। আপনার ওয়ালেটে ৳৩০০ বোনাস যোগ করা হয়েছে!', 'success');
    showToast('সফলভাবে ঘোষণা দেওয়া হয়েছে এবং বোনাস প্রদান করা হয়েছে! 🎉', 'success');
  }).catch(function(error) { showToast('এরর: ' + error.message, 'error'); });
}

function viewOrderDetails(orderId) {

  var customer = DEFAULT_DATA.users.find(function(u) { return u && u.id === order.userId; });
  var itemsHtml = '';
  if (order.items && order.items.length > 0) {
    for (var i = 0; i < order.items.length; i++) {
      var item = order.items[i];
      var product = DEFAULT_DATA.products.find(function(p) { return p && p.id === item.id; });
      if (product) {
        itemsHtml += '<div class="flex justify-between items-center p-2 bg-gray-50 rounded mb-2"><div><p class="font-semibold">' + product.name + '</p><p class="text-xs text-gray-500">' + product.category + '</p></div><div class="text-right"><p class="font-bold">৳' + product.price + ' x ' + item.qty + '</p><p class="text-sm">৳' + (product.price * item.qty) + '</p></div></div>';

  modalContent += '<div class="bg-green-50 rounded-lg p-4 mb-4"><h3 class="font-bold text-green-900 mb-2">📦 অর্ডার তথ্য</h3>';
  modalContent += '<p class="text-sm"><strong>তারিখ:</strong> ' + (order.createdAt || '') + '</p>';
  modalContent += '<p class="text-sm"><strong>পেমেন্ট:</strong> ' + (order.payment || '') + '</p>';

  modalContent += '<div class="bg-purple-50 rounded-lg p-4 mb-4"><h3 class="font-bold text-purple-900 mb-2">🛍️ প্রোডাক্ট সমূহ</h3>' + (itemsHtml || '<p class="text-gray-500">কোনো প্রোডাক্ট নেই</p>') + '</div>';
  modalContent += '<div class="bg-yellow-50 rounded-lg p-4"><h3 class="font-bold text-yellow-900 mb-2">💰 মূল্য তথ্য</h3>';
  modalContent += '<p class="text-sm"><strong>সাবটোটাল:</strong> ৳' + (order.subtotal || 0) + '</p>';

function updateCartQty(id, delta) { var item = state.cart.find(function(c) { return c.id === id; }); if (!item) return; item.qty += delta; if (item.qty <= 0) state.cart = state.cart.filter(function(c) { return c.id !== id; }); saveData(); renderApp(); }
function removeFromCart(id) { state.cart = state.cart.filter(function(c) { return c.id !== id; }); saveData(); showToast('কার্ট থেকে সরানো হয়েছে', 'info'); renderApp(); }
function toggleWishlist(id) { var idx = state.wishlist.indexOf(id); if (idx !== -1) { state.wishlist.splice(idx, 1); showToast('উইশলিস্ট থেকে সরানো হয়েছে', 'info'); } else { state.wishlist.push(id); showToast('উইশলিস্টে যোগ হয়েছে ❤️', 'success'); } saveData(); renderApp(); }

function showCheckout() { showModal('<div class="p-6"><h2 class="text-2xl font-bold mb-4 text-gray-900">চেকআউট</h2><div class="space-y-4"><div><label class="block text-sm font-medium mb-1 text-gray-700">পেমেন্ট মেথড</label><select id="checkout-payment" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"><option value="COD">ক্যাশ অন ডেলিভারি</option><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select></div><div><label class="block text-sm font-medium mb-1 text-gray-700">অর্ডার নোট</label><textarea id="checkout-note" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900" rows="2"></textarea></div></div><div class="flex gap-2 mt-6"><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-medium">বাতিল</button><button type="button" onclick="placeOrder()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold">কনফার্ম</button></div></div>'); }

function placeOrder() { var payment = document.getElementById('checkout-payment').value; var note = document.getElementById('checkout-note').value; var subtotal = 0; for (var i = 0; i < state.cart.length; i++) { var c = state.cart[i]; var p = DEFAULT_DATA.products.find(function(x) { return x && x.id === c.id; }); if (p) subtotal += p.price * c.qty; } var order = { id: Date.now(), userId: state.currentUser.id, items: JSON.parse(JSON.stringify(state.cart)), payment: payment, note: note, subtotal: subtotal, shipping: 60, total: subtotal + 60, status: 'Pending', createdAt: new Date().toISOString().split('T')[0] }; database.ref('orders/' + order.id).set(order); for (var j = 0; j < state.cart.length; j++) { var item = state.cart[j]; var prod = DEFAULT_DATA.products.find(function(x) { return x && x.id === item.id; }); if (prod) { prod.stock = Math.max(0, prod.stock - item.qty); database.ref('products/' + prod.id).update({ stock: prod.stock }); } } state.cart = []; saveData(); closeModal(); showToast('অর্ডার সফল! 🎉 Admin Panel-এ দেখুন', 'success'); addNotification(state.currentUser.id, 'অর্ডার #' + order.id + ' প্লেস হয়েছে!', 'success'); var adminPhone = '8801913821910'; var message = 'নতুন অর্ডার! #' + order.id + ' - ৳' + order.total + ' - ' + state.currentUser.name + ' - ' + state.currentUser.phone; var whatsappUrl = 'https://wa.me/' + adminPhone + '?text=' + encodeURIComponent(message); window.open(whatsappUrl, '_blank'); renderApp(); }

function requestWithdraw() { var method = document.getElementById('withdraw-method').value; var amount = parseFloat(document.getElementById('withdraw-amount').value); var account = document.getElementById('withdraw-account').value.trim(); if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন!', 'error'); return; } if (!account) { showToast('অ্যাকাউন্ট নম্বর দিন!', 'error'); return; } if (amount > state.currentUser.balance) { showToast('পর্যাপ্ত ব্যালেন্স নেই!', 'error'); return; } state.currentUser.balance -= amount; var u = DEFAULT_DATA.users.find(function(x) { return x && x.id === state.currentUser.id; }); if (u) { u.balance = state.currentUser.balance; database.ref('users/' + u.id).update({ balance: u.balance }); } var withdrawal = { id: Date.now(), userId: state.currentUser.id, method: method, amount: amount, account: account, status: 'Pending', date: new Date().toISOString().split('T')[0] }; database.ref('withdrawals/' + withdrawal.id).set(withdrawal); DEFAULT_DATA.transactions.push({ id: Date.now(), userId: state.currentUser.id, type: 'উইথড্র রিকোয়েস্ট (' + method + ')', amount: -amount, date: new Date().toISOString().split('T')[0] }); addNotification(state.currentUser.id, '৳' + amount + ' উইথড্র রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে (' + method + ')।', 'info'); saveData(); showToast('উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!', 'success'); renderApp(); }

function saveProfile() { var name = document.getElementById('prof-name').value.trim(); var email = document.getElementById('prof-email').value.trim(); var phone = document.getElementById('prof-phone').value.trim(); var shopName = document.getElementById('prof-shop').value.trim(); if (!name || !email || !phone) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; } state.currentUser.name = name; state.currentUser.email = email; state.currentUser.phone = phone; state.currentUser.shopName = shopName; var user = DEFAULT_DATA.users.find(function(u) { return u && u.id === state.currentUser.id; }); if (user) { user.name = name; user.email = email; user.phone = phone; user.shopName = shopName; database.ref('users/' + user.id).update({ name: name, email: email, phone: phone, shopName: shopName }); } var oldPass = document.getElementById('prof-old-pass').value; var newPass = document.getElementById('prof-new-pass').value; if (oldPass || newPass) { if (oldPass !== state.currentUser.password) { showToast('বর্তমান পাসওয়ার্ড ভুল!', 'error'); return; } if (newPass.length < 6) { showToast('নতুন পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error'); return; } state.currentUser.password = newPass; if (user) { user.password = newPass; database.ref('users/' + user.id).update({ password: newPass }); } addNotification(state.currentUser.id, 'আপনার পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে।', 'info'); showToast('পাসওয়ার্ড পরিবর্তন হয়েছে!', 'success'); } saveData(); showToast('প্রোফাইল আপডেট হয়েছে!', 'success'); renderApp(); }

function toggleMobileMenu() { var menu = document.getElementById('mobile-menu'); if (menu) menu.classList.toggle('hidden'); }
function scrollToSection(id) { state.currentView = 'home'; renderApp(); setTimeout(function() { var el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth' }); }, 100); }

function renderApp() { var app = document.getElementById('app'); if (!state.currentUser) { if (state.currentView === 'login') app.innerHTML = renderLogin(); else if (state.currentView === 'register') app.innerHTML = renderRegister(); else app.innerHTML = renderHome(); } else { app.innerHTML = renderDashboard(); } window.scrollTo(0, 0); }

loadData();
renderApp();
</script>
</body>
