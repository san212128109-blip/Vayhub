  ],

let state = {
  currentUser: null,
  currentView: 'home',
  cart: [],
  wishlist: [],
  selectedCategory: 'all',
  searchQuery: '',
  dashboardView: 'home',
  userDropdown: false,
  notifDropdown: false,
  sidebarOpen: false,

  newOrderIds: []

// ==========================================
// 🔄 রিয়েল-টাইম সিন্ক সিস্টেম (BroadcastChannel + Storage Event)
// ==========================================
let syncChannel = null;
try {
  syncChannel = new BroadcastChannel('hatdrop_sync');
  syncChannel.onmessage = function(event) {
    handleSyncMessage(event.data);
  };
} catch(e) {
  console.log('BroadcastChannel not supported, using storage events only');
}

// অন্য ট্যাব থেকে localStorage পরিবর্তন হলে
window.addEventListener('storage', function(e) {
  if (e.key === 'ohds_data' && e.newValue) {
    try {
      const newData = JSON.parse(e.newValue);
      const oldOrders = DEFAULT_DATA.orders;
      
      // ডাটা আপডেট
      DEFAULT_DATA.users = newData.users || DEFAULT_DATA.users;
      DEFAULT_DATA.products = newData.products || DEFAULT_DATA.products;
      DEFAULT_DATA.notifications = newData.notifications || [];
      DEFAULT_DATA.addresses = newData.addresses || [];
      DEFAULT_DATA.transactions = newData.transactions || [];
      DEFAULT_DATA.withdrawals = newData.withdrawals || [];
      
      // নতুন অর্ডার চেক
      const newOrders = newData.orders || [];
      if (newOrders.length > oldOrders.length) {
        const addedOrders = newOrders.slice(oldOrders.length);
        state.newOrderIds = addedOrders.map(function(o) { return o.id; });
        
        // অ্যাডমিন/CEO হলে অ্যালার্ট দেখাও
        if (state.currentUser && (state.currentUser.role === 'CEO' || state.currentUser.role === 'Admin')) {
          showNewOrderPopup(addedOrders);
          playOrderSound();
        }
      }
      
      DEFAULT_DATA.orders = newOrders;
      
      // কারেন্ট ইউজার আপডেট
      if (state.currentUser) {
        const updatedUser = DEFAULT_DATA.users.find(function(u) { return u.id === state.currentUser.id; });
        if (updatedUser) state.currentUser = updatedUser;
      }
      
      renderApp();
    } catch(err) {
      console.error('Storage sync error:', err);
    }
  }
});

function handleSyncMessage(data) {
  if (!data || !data.type) return;
  
  if (data.type === 'NEW_ORDER') {
    // নতুন অর্ডার এসেছে
    const order = data.order;
    const exists = DEFAULT_DATA.orders.find(function(o) { return o.id === order.id; });
    if (!exists) {
      DEFAULT_DATA.orders.push(order);
      state.newOrderIds.push(order.id);
      
      // অ্যাডমিন প্যানেলে অ্যালার্ট
      if (state.currentUser && (state.currentUser.role === 'CEO' || state.currentUser.role === 'Admin')) {
        showNewOrderPopup([order]);
        playOrderSound();
      }
      
      // কারেন্ট ইউজারের ব্যালেন্স/ডাটা আপডেট
      if (state.currentUser) {
        const updatedUser = DEFAULT_DATA.users.find(function(u) { return u.id === state.currentUser.id; });
        if (updatedUser) state.currentUser = updatedUser;
      }
      
      renderApp();
    }
  } else if (data.type === 'DATA_UPDATE') {
    // যেকোনো ডাটা আপডেট
    if (data.data) {
      if (data.data.orders) DEFAULT_DATA.orders = data.data.orders;
      if (data.data.users) DEFAULT_DATA.users = data.data.users;
      if (data.data.products) DEFAULT_DATA.products = data.data.products;
      if (data.data.notifications) DEFAULT_DATA.notifications = data.data.notifications;
      if (data.data.withdrawals) DEFAULT_DATA.withdrawals = data.data.withdrawals;
      if (data.data.transactions) DEFAULT_DATA.transactions = data.data.transactions;
      
      if (state.currentUser) {
        const updatedUser = DEFAULT_DATA.users.find(function(u) { return u.id === state.currentUser.id; });
        if (updatedUser) state.currentUser = updatedUser;
      }
      
      renderApp();
    }
  } else if (data.type === 'ORDER_STATUS_UPDATE') {
    // অর্ডার স্ট্যাটাস আপডেট
    const order = DEFAULT_DATA.orders.find(function(o) { return o.id === data.orderId; });
    if (order) {
      order.status = data.newStatus;
      if (state.currentUser && state.currentUser.id === data.userId) {
        renderApp();
      }
    }
  }
}

function broadcastSync(message) {
  try {
    if (syncChannel) {
      syncChannel.postMessage(message);
    }
  } catch(e) {
    console.error('Broadcast error:', e);
  }
}

// 🔊 নতুন অর্ডার সাউন্ড
function playOrderSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // প্রথম বিপ
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.frequency.value = 880;
    osc1.type = 'sine';
    gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc1.start(audioCtx.currentTime);
    osc1.stop(audioCtx.currentTime + 0.3);
    
    // দ্বিতীয় বিপ (উচ্চ স্বরে)
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.frequency.value = 1100;
    osc2.type = 'sine';
    gain2.gain.setValueAtTime(0.3, audioCtx.currentTime + 0.15);
    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc2.start(audioCtx.currentTime + 0.15);
    osc2.stop(audioCtx.currentTime + 0.5);
    
    // তৃতীয় বিপ (আরো উচ্চ)
    const osc3 = audioCtx.createOscillator();
    const gain3 = audioCtx.createGain();
    osc3.connect(gain3);
    gain3.connect(audioCtx.destination);
    osc3.frequency.value = 1320;
    osc3.type = 'sine';
    gain3.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.3);
    gain3.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
    osc3.start(audioCtx.currentTime + 0.3);
    osc3.stop(audioCtx.currentTime + 0.8);
  } catch(e) {
    console.log('Audio not supported');
  }
}

// 🎉 নতুন অর্ডার পপআপ
function showNewOrderPopup(orders) {
  const popup = document.getElementById('new-order-popup');
  if (!popup) return;
  
  let html = '';
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var customer = DEFAULT_DATA.users.find(function(u) { return u.id === o.userId; });
    var custName = customer ? customer.name : 'Unknown';
    
    html += '<div class="bg-white rounded-2xl shadow-2xl border-2 border-green-500 p-4 mb-3 max-w-sm new-order-alert order-flash" id="popup-' + o.id + '">' +
      '<div class="flex items-start gap-3">' +
      '<div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white text-2xl flex-shrink-0 new-order-badge">🛒</div>' +
      '<div class="flex-1 min-w-0">' +
      '<p class="font-bold text-green-700 text-sm">🎉 নতুন অর্ডার এসেছে!</p>' +
      '<p class="font-bold text-gray-900">অর্ডার #' + o.id + '</p>' +
      '<p class="text-sm text-gray-600">কাস্টমার: ' + custName + '</p>' +
      '<p class="text-lg font-black text-indigo-600">৳' + o.total + '</p>' +
      '<p class="text-xs text-gray-500">' + o.payment + ' • ' + o.items.length + 'টি আইটেম</p>' +
      '</div>' +
      '<button type="button" onclick="dismissOrderPopup(' + o.id + ')" class="text-gray-400 hover:text-gray-600 text-xl flex-shrink-0">✕</button>' +
      '</div>' +
      '<button type="button" onclick="viewNewOrder(' + o.id + ')" class="w-full mt-2 bg-green-600 text-white py-2 rounded-lg font-semibold text-sm hover:bg-green-700">📋 অর্ডার দেখুন</button>' +
      '</div>';
  }
  
  popup.innerHTML = html;
  popup.classList.remove('hidden');
  
  // ১০ সেকেন্ড পর অটো বন্ধ
  setTimeout(function() {
    if (popup) {
      popup.classList.add('hidden');
      popup.innerHTML = '';
    }
  }, 15000);
}

window.dismissOrderPopup = function(orderId) {
  var el = document.getElementById('popup-' + orderId);
  if (el) {
    el.style.transition = 'all 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(100px)';
    setTimeout(function() { el.remove(); }, 300);
  }
  // সব পপআপ চেক
  var popup = document.getElementById('new-order-popup');
  if (popup && popup.children.length === 0) {
    popup.classList.add('hidden');
  }
};

window.viewNewOrder = function(orderId) {
  state.dashboardView = 'admin';
  renderApp();
  setTimeout(function() {
    showAdminTab('orders');
    // অর্ডার হাইলাইট
    var row = document.getElementById('order-row-' + orderId);
    if (row) {
      row.classList.add('order-flash');
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 200);
  dismissOrderPopup(orderId);
};

// ==========================================
// ডাটা লোড/সেভ
// ==========================================
function loadData() {
  try {
    const saved = localStorage.getItem('ohds_data');
    if (saved) {
      const parsed = JSON.parse(saved);
      DEFAULT_DATA.users = parsed.users || DEFAULT_DATA.users;
      DEFAULT_DATA.products = parsed.products || DEFAULT_DATA.products;
      DEFAULT_DATA.orders = parsed.orders || [];
      DEFAULT_DATA.notifications = parsed.notifications || [];
      DEFAULT_DATA.addresses = parsed.addresses || [];
      DEFAULT_DATA.transactions = parsed.transactions || [];
      DEFAULT_DATA.withdrawals = parsed.withdrawals || [];
    }
    state.lastOrderCount = DEFAULT_DATA.orders.length;
    
    const savedUser = localStorage.getItem('ohds_current_user');
    if (savedUser) {
      state.currentUser = JSON.parse(savedUser);
      state.currentView = 'dashboard';
      state.dashboardView = 'home';
    }
    const savedCart = localStorage.getItem('ohds_cart');
    if (savedCart) state.cart = JSON.parse(savedCart);
    const savedWishlist = localStorage.getItem('ohds_wishlist');
    if (savedWishlist) state.wishlist = JSON.parse(savedWishlist);
  } catch(e) { console.error('Load error:', e); }
}

function saveData() {
  try {
    localStorage.setItem('ohds_data', JSON.stringify({
      users: DEFAULT_DATA.users,
      products: DEFAULT_DATA.products,
      orders: DEFAULT_DATA.orders,
      notifications: DEFAULT_DATA.notifications,
      addresses: DEFAULT_DATA.addresses,
      transactions: DEFAULT_DATA.transactions,
      withdrawals: DEFAULT_DATA.withdrawals
    }));
    if (state.currentUser) localStorage.setItem('ohds_current_user', JSON.stringify(state.currentUser));
    localStorage.setItem('ohds_cart', JSON.stringify(state.cart));
    localStorage.setItem('ohds_wishlist', JSON.stringify(state.wishlist));
    
    // অন্য ট্যাবকে জানান
    broadcastSync({
      type: 'DATA_UPDATE',
      data: {
        orders: DEFAULT_DATA.orders,
        users: DEFAULT_DATA.users,
        products: DEFAULT_DATA.products,
        notifications: DEFAULT_DATA.notifications,
        withdrawals: DEFAULT_DATA.withdrawals,
        transactions: DEFAULT_DATA.transactions
      }
    });
  } catch(e) { console.error('Save error:', e); }
}

function showToast(message, type) {
  type = type || 'success';
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
  toast.className = colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg toast-enter flex items-center gap-2 min-w-[250px]';
  const icons = { success: '✓', error: '✗', info: 'ℹ', warning: '⚠' };
  toast.innerHTML = '<span class="text-xl font-bold">' + icons[type] + '</span><span class="font-medium">' + message + '</span>';
  container.appendChild(toast);
  setTimeout(function() { 
    toast.style.opacity = '0'; 
    toast.style.transition = 'opacity 0.3s'; 
    setTimeout(function() { if(toast.parentNode) toast.remove(); }, 300); 
  }, 3000);
}

function showModal(content) {
  document.getElementById('modal-container').innerHTML = '<div class="fixed inset-0 bg-black bg-opacity-60 z-40 flex items-center justify-center p-4" onclick="if(event.target===this)closeModal()"><div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto fade-in text-gray-900">' + content + '</div></div>';
}

function closeModal() { 
  document.getElementById('modal-container').innerHTML = ''; 
}

function addNotification(userId, message, type) {
  DEFAULT_DATA.notifications.push({ 
    id: Date.now() + Math.random(), 
    userId: userId, 
    message: message, 
    type: type || 'info', 
    read: false, 
    createdAt: new Date().toISOString() 
  });
  saveData();
}

function notifyAllUsers(message, type) {
  for (var i = 0; i < DEFAULT_DATA.users.length; i++) {
    addNotification(DEFAULT_DATA.users[i].id, message, type);
  }
}

function getStatusColor(status) {
  var colors = { 
    'Pending': 'bg-yellow-100 text-yellow-800', 
    'On Way': 'bg-blue-100 text-blue-800', 
    'Delivery': 'bg-purple-100 text-purple-800', 
    'Done': 'bg-green-100 text-green-800', 
    'Cancelled': 'bg-red-100 text-red-800',
    'Received': 'bg-indigo-100 text-indigo-800'
  };
  return colors[status] || 'bg-gray-100 text-gray-800';
}

function handleFileUpload(inputId, callback) {
  var input = document.getElementById(inputId);
  if (input && input.files && input.files[0]) {
    var file = input.files[0];
    if (file.size > 5 * 1024 * 1024) {
      showToast('ফাইল সাইজ ৫MB এর কম হতে হবে!', 'error');
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e) {
      callback(e.target.result);
    };
    reader.readAsDataURL(file);
  }
}

function downloadFile(dataUrl, filename) {
  if (!dataUrl) {
    showToast('ডাউনলোড করার মতো কিছু নেই!', 'error');
    return;
  }
  var link = document.createElement('a');
  link.href = dataUrl;
  link.download = filename || 'download';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('ডাউনলোড শুরু হয়েছে!', 'success');
}

window.doLogout = function() {
  try {
    state.currentUser = null;
    state.currentView = 'home';
    state.dashboardView = 'home';
    state.userDropdown = false;
    state.notifDropdown = false;
    state.sidebarOpen = false;
    localStorage.removeItem('ohds_current_user');
    showToast('লগআউট সফল হয়েছে!', 'info');
    setTimeout(function() {
      renderApp();
    }, 500);
  } catch(e) {
    console.error('Logout error:', e);
    alert('Logout error: ' + e.message);
  }
};

function doLogin() {
  try {
    var emailInput = document.getElementById('login-email');
    var passwordInput = document.getElementById('login-password');
    if (!emailInput || !passwordInput) {
      showToast('ফর্ম লোড হয়নি! পেজ রিফ্রেশ করুন।', 'error');
      return;
    }
    var email = emailInput.value.trim();
    var password = passwordInput.value;
    if (!email || !password) {
      showToast('ইমেইল এবং পাসওয়ার্ড দিন!', 'error');
      return;
    }
    var user = DEFAULT_DATA.users.find(function(u) { 
      return (u.email === email || u.username === email) && u.password === password; 
    });
    if (user) {
      state.currentUser = user;
      state.currentView = 'dashboard';
      state.dashboardView = 'home';
      saveData();
      showToast('সফলভাবে লগইন হয়েছে! স্বাগতম ' + user.name, 'success');
      renderApp();
    } else {
      showToast('ভুল ইমেইল/ইউজারনেম বা পাসওয়ার্ড!', 'error');
    }
  } catch(e) {
    showToast('লগইন error: ' + e.message, 'error');
  }
}

var forgotOTP = '';
var forgotUser = null;

function sendForgotOTP() {
  var email = document.getElementById('forgot-email').value.trim();
  forgotUser = DEFAULT_DATA.users.find(function(u) { return u.email === email; });
  if (!forgotUser) { showToast('ইউজার খুঁজে পাওয়া যায়নি!', 'error'); return; }
  forgotOTP = Math.floor(100000 + Math.random() * 900000).toString();
  document.getElementById('forgot-otp-display').textContent = forgotOTP;
  document.getElementById('forgot-step-1').classList.add('hidden');
  document.getElementById('forgot-step-2').classList.remove('hidden');
  showToast('OTP পাঠানো হয়েছে!', 'info');
}

function resetPassword() {
  var otp = document.getElementById('forgot-otp').value;
  var newPass = document.getElementById('forgot-new-password').value;
  if (otp !== forgotOTP) { showToast('ভুল OTP!', 'error'); return; }
  if (newPass.length < 6) { showToast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error'); return; }
  forgotUser.password = newPass;
  saveData();
  closeModal();
  showToast('পাসওয়ার্ড সফলভাবে রিসেট হয়েছে!', 'success');
}

function doRegister() {
  try {
    var name = document.getElementById('reg-name').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var phone = document.getElementById('reg-phone').value.trim();
    var address = document.getElementById('reg-address').value.trim();
    var password = document.getElementById('reg-password').value;
    var confirm = document.getElementById('reg-confirm').value;
    if (!name || !email || !phone || !address) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; }
    if (password !== confirm) { showToast('পাসওয়ার্ড মিলছে না!', 'error'); return; }
    if (password.length < 6) { showToast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error'); return; }
    if (DEFAULT_DATA.users.find(function(u) { return u.email === email; })) { showToast('এই ইমেইল ইতিমধ্যে ব্যবহৃত!', 'error'); return; }
    var newUser = {
      id: Date.now(),
      name: name, email: email, phone: phone,
      username: email.split('@')[0],
      password: password,
      role: 'Customer',
      balance: 0, verified: false,
      shopName: '', address: address,
      createdAt: new Date().toISOString().split('T')[0],
      credits: 100
    };
    DEFAULT_DATA.users.push(newUser);
    state.currentUser = newUser;
    state.currentView = 'dashboard';
    state.dashboardView = 'home';
    saveData();
    showToast('রেজিস্ট্রেশন সফল! স্বাগতম ' + name, 'success');
    renderApp();
  } catch(e) {
    showToast('রেজিস্ট্রেশন error: ' + e.message, 'error');
  }
}

    '<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-gray-900">সাম্প্রতিক অর্ডার</h3><button type="button" onclick="state.dashboardView=\'orders\';renderApp();" class="text-indigo-600 text-sm font-medium">সব দেখুন →</button></div>';
  if (userOrders.length === 0) {
    html += '<div class="text-center py-8 text-gray-400"><p class="text-4xl mb-2">📭</p><p>এখানে কোনো অর্ডার নেই</p><button type="button" onclick="state.dashboardView=\'products\';renderApp();" class="text-indigo-600 text-sm mt-2 font-medium">প্রোডাক্ট দেখুন →</button></div>';
  } else {
    html += '<div class="space-y-2">';
    var recent = userOrders.slice(-5).reverse();
    for (var j = 0; j < recent.length; j++) {

      html += '<div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg ' + (isNew ? 'order-flash' : '') + '"><div><p class="font-semibold text-sm text-gray-900">#' + o.id + '</p><p class="text-xs text-gray-500">' + o.createdAt + '</p></div><span class="text-xs px-2 py-1 rounded-full ' + getStatusColor(o.status) + '">' + o.status + '</span></div>';

  return html;

function renderDashProducts() {
  var products = DEFAULT_DATA.products;
  if (state.selectedCategory !== 'all') products = products.filter(function(p) { return p.category === state.selectedCategory; });
  if (state.searchQuery) {
    var q = state.searchQuery.toLowerCase();
    products = products.filter(function(p) { return p.name.toLowerCase().indexOf(q) !== -1; });
  }
  var cats = ['all', 'T-shirt', 'Shirt', 'Pants', 'Electronics'];
  var catHtml = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var cls = (state.selectedCategory === c) ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-200';
    var label = (c === 'all') ? 'সব' : c;
    catHtml += '<button type="button" onclick="state.selectedCategory=\'' + c + '\';renderApp();" class="px-4 py-2 rounded-full whitespace-nowrap ' + cls + '">' + label + '</button>';
  }
  var prodHtml = '';
  for (var j = 0; j < products.length; j++) prodHtml += renderDashProductCard(products[j]);
  return '<div class="fade-in">' +
    '<div class="mb-6"><input type="text" value="' + state.searchQuery + '" oninput="state.searchQuery=this.value;renderApp();" class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-lg text-gray-900 bg-white" placeholder="প্রোডাক্ট খুঁজুন..."></div>' +
    '<div class="flex gap-2 overflow-x-auto pb-2 mb-6">' + catHtml + '</div>' +
    '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">' + prodHtml + '</div></div>';
}

function renderDashProductCard(p) {
  var discount = Math.round((1 - p.price / p.originalPrice) * 100);
  var inWishlist = state.wishlist.indexOf(p.id) !== -1;
  var inCart = state.cart.find(function(c) { return c.id === p.id; });
  var hasVideo = p.video ? true : false;
  var isBase64Image = p.image && p.image.startsWith('data:');
  var isBase64Video = p.video && p.video.startsWith('data:');
  
  return '<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden card-hover">' +
    '<div class="relative">' +
    '<img src="' + p.image + '" class="w-full h-48 object-cover">' +
    (discount > 0 ? '<span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded font-bold">' + discount + '% OFF</span>' : '') +
    (hasVideo ? '<span class="absolute top-2 right-12 bg-purple-500 text-white text-xs px-2 py-1 rounded font-bold">🎬 ভিডিও</span>' : '') +
    '<button type="button" onclick="toggleWishlist(' + p.id + ')" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow">' + (inWishlist ? '❤️' : '🤍') + '</button></div>' +
    '<div class="p-4"><p class="text-xs text-gray-500 mb-1">' + p.category + '</p>' +
    '<h3 class="font-semibold text-gray-900 truncate mb-2">' + p.name + '</h3>' +
    '<div class="flex items-center gap-2 mb-2"><span class="text-lg font-bold text-indigo-600">৳' + p.price + '</span><span class="text-sm text-gray-400 line-through">৳' + p.originalPrice + '</span></div>' +
    '<p class="text-xs text-green-600 mb-3">স্টক: ' + p.stock + '</p>' +
    '<div class="flex gap-2 mb-2">' +
    (isBase64Image ? '<button type="button" onclick="downloadFile(\'' + p.image + '\', \'' + p.name.replace(/[^a-zA-Z0-9]/g, '_') + '.jpg\')" class="flex-1 text-xs bg-blue-100 text-blue-700 px-2 py-1.5 rounded hover:bg-blue-200 font-medium">📥 ছবি</button>' : '') +
    (isBase64Video ? '<button type="button" onclick="downloadFile(\'' + p.video + '\', \'' + p.name.replace(/[^a-zA-Z0-9]/g, '_') + '.mp4\')" class="flex-1 text-xs bg-purple-100 text-purple-700 px-2 py-1.5 rounded hover:bg-purple-200 font-medium">📥 ভিডিও</button>' : '') +
    '</div>' +
    '<button type="button" onclick="addToCart(' + p.id + ')" ' + (inCart ? 'disabled' : '') + ' class="w-full py-2 rounded-lg font-medium ' + (inCart ? 'bg-green-100 text-green-700' : 'bg-indigo-600 text-white hover:bg-indigo-700') + '">' + (inCart ? '✓ কার্টে আছে' : 'কার্টে যোগ করুন') + '</button></div></div>';
}

function renderDashCart() {
  if (state.cart.length === 0) return '<div class="text-center py-12 fade-in"><p class="text-gray-500 text-lg mb-4">কার্ট খালি</p><button type="button" onclick="state.dashboardView=\'products\';renderApp();" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium">প্রোডাক্ট দেখুন</button></div>';
  var subtotal = 0;
  var itemsHtml = '';
  for (var i = 0; i < state.cart.length; i++) {
    var c = state.cart[i];
    var p = DEFAULT_DATA.products.find(function(x) { return x.id === c.id; });
    if (!p) continue;
    subtotal += p.price * c.qty;
    itemsHtml += '<div class="bg-white rounded-xl p-4 shadow-sm flex gap-4 border border-gray-100">' +
      '<img src="' + p.image + '" class="w-24 h-24 object-cover rounded-lg">' +
      '<div class="flex-1"><h3 class="font-semibold text-gray-900">' + p.name + '</h3><p class="text-sm text-gray-500 mb-2">৳' + p.price + '</p>' +
      '<div class="flex items-center gap-2"><button type="button" onclick="updateCartQty(' + p.id + ',-1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">-</button><span class="font-bold w-8 text-center">' + c.qty + '</span><button type="button" onclick="updateCartQty(' + p.id + ',1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">+</button><button type="button" onclick="removeFromCart(' + p.id + ')" class="ml-auto text-red-500">🗑️</button></div></div>' +
      '<div class="font-bold text-indigo-600 flex items-center">৳' + (p.price * c.qty) + '</div></div>';
  }
  var shipping = 60;
  var total = subtotal + shipping;
  return '<div class="fade-in"><h2 class="text-2xl font-bold mb-6 text-gray-900">শপিং কার্ট</h2>' +
    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">' +
    '<div class="lg:col-span-2 space-y-3">' + itemsHtml + '</div>' +
    '<div class="bg-white rounded-xl p-6 shadow-sm h-fit border border-gray-100">' +
    '<h3 class="font-bold text-lg mb-4 text-gray-900">অর্ডার সামারি</h3>' +
    '<div class="space-y-2 text-sm text-gray-700">' +
    '<div class="flex justify-between"><span>সাবটোটাল</span><span>৳' + subtotal + '</span></div>' +
    '<div class="flex justify-between"><span>শিপিং</span><span>৳' + shipping + '</span></div>' +
    '<div class="flex justify-between font-bold text-lg border-t pt-2 text-gray-900"><span>মোট</span><span class="text-indigo-600">৳' + total + '</span></div></div>' +
    '<button type="button" onclick="showCheckout()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">অর্ডার করুন</button></div></div></div>';
}

function renderPackages() {

function confirmPackage(id) {
  var txn = document.getElementById('pkg-txn').value.trim();
  if (!txn) { showToast('ট্রানজেকশন ID দিন!', 'error'); return; }
  var pkg = DEFAULT_DATA.packages.find(function(p) { return p.id === id; });
  state.currentUser.credits = (state.currentUser.credits || 0) + (pkg.id === 1 ? 100 : 200);
  var u = DEFAULT_DATA.users.find(function(x) { return x.id === state.currentUser.id; });
  if (u) u.credits = state.currentUser.credits;
  saveData();
  closeModal();
  showToast('প্যাকেজ ক্রয় সফল! ক্রেডিট যোগ হয়েছে।', 'success');
  renderApp();
}

function showAdminTab(tabName) {
  var tabs = ['users', 'products', 'orders', 'withdrawals', 'broadcast'];
  for (var i = 0; i < tabs.length; i++) {
    var el = document.getElementById('admin-tab-' + tabs[i]);
    var btn = document.getElementById('tab-' + tabs[i]);
    if (el) {
      if (tabs[i] === tabName) {
        el.classList.remove('hidden');
        btn.className = 'px-4 py-2 rounded-t-lg font-medium bg-indigo-600 text-white whitespace-nowrap relative';
        // পেন্ডিং অর্ডার ব্যাজ
        if (tabs[i] === 'orders') {
          var pendingOrders = DEFAULT_DATA.orders.filter(function(o) { return o.status === 'Pending'; }).length;

        }

function updateOrderStatus(orderId, newStatus) {
  var order = DEFAULT_DATA.orders.find(function(o) { return o.id === orderId; });
  if (order) {
    var oldStatus = order.status;
    order.status = newStatus;
    saveData();
    
    // অন্য ট্যাবকে জানান
    broadcastSync({
      type: 'ORDER_STATUS_UPDATE',
      orderId: orderId,
      newStatus: newStatus,
      userId: order.userId
    });
    
    showToast('অর্ডার স্ট্যাটাস আপডেট হয়েছে: ' + newStatus, 'success');
    addNotification(order.userId, 'আপনার অর্ডার #' + orderId + ' এর স্ট্যাটাস পরিবর্তন হয়েছে: ' + oldStatus + ' → ' + newStatus, 'info');
    renderApp();
  }
}

function updateWithdrawalStatus(withdrawalId, newStatus) {
  var w = DEFAULT_DATA.withdrawals.find(function(x) { return x.id === withdrawalId; });
  if (w) {
    var oldStatus = w.status;
    w.status = newStatus;
    
    if (oldStatus === 'Pending' && newStatus === 'Cancelled') {
      var user = DEFAULT_DATA.users.find(function(u) { return u.id === w.userId; });
      if (user) {
        user.balance += w.amount;
        if (state.currentUser && state.currentUser.id === user.id) {
          state.currentUser.balance += w.amount;
        }
        addNotification(w.userId, 'আপনার ৳' + w.amount + ' এর উইথড্র রিকোয়েস্ট বাতিল করা হয়েছে এবং টাকা আপনার ব্যালেন্সে ফেরত দেওয়া হয়েছে।', 'info');
      }
    } else if (newStatus === 'Done') {
      addNotification(w.userId, 'আপনার ৳' + w.amount + ' এর উইথড্র রিকোয়েস্ট সফলভাবে সম্পন্ন হয়েছে।', 'success');
    } else if (newStatus === 'Cancelled' && oldStatus !== 'Pending') {
       addNotification(w.userId, 'আপনার ৳' + w.amount + ' এর উইথড্র রিকোয়েস্ট বাতিল করা হয়েছে।', 'error');
    }
    
    saveData();
    showToast('উইথড্র স্ট্যাটাস আপডেট হয়েছে: ' + newStatus, 'success');
    renderApp();
  }
}

    '<div><label class="block text-sm font-medium text-gray-700 mb-1">ক্যাটাগরি</label><select id="ep-category" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900"><option ' + (p.category==='T-shirt'?'selected':'') + '>T-shirt</option><option ' + (p.category==='Shirt'?'selected':'') + '>Shirt</option><option ' + (p.category==='Pants'?'selected':'') + '>Pants</option><option ' + (p.category==='Electronics'?'selected':'') + '>Electronics</option><option ' + (p.category==='Watch'?'selected':'') + '>Watch</option><option ' + (p.category==='Fashion'?'selected':'') + '>Fashion</option><option ' + (p.category==='Home Decor'?'selected':'') + '>Home Decor</option><option ' + (p.category==='Clothing'?'selected':'') + '>Clothing</option></select></div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">স্টক</label><input type="number" id="ep-stock" value="' + p.stock + '" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900"></div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">বিক্রয় মূল্য</label><input type="number" id="ep-price" value="' + p.price + '" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900"></div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">আসল মূল্য</label><input type="number" id="ep-original" value="' + p.originalPrice + '" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900"></div>' +
    '</div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">ছবি আপলোড</label>' +
    '<input type="file" id="ep-image-file" accept="image/*" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 text-sm">' +
    '<p class="text-xs text-gray-500 mt-1">অথবা URL:</p>' +
    '<input type="text" id="ep-image" value="' + (isBase64Image ? '' : p.image) + '" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 text-sm" placeholder="https://..."></div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">ভিডিও আপলোড</label>' +
    '<input type="file" id="ep-video-file" accept="video/*" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 text-sm">' +
    '<p class="text-xs text-gray-500 mt-1">অথবা URL:</p>' +
    '<input type="text" id="ep-video" value="' + (isBase64Video ? '' : (p.video || '')) + '" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 text-sm" placeholder="ভিডিও URL"></div>' +
    '<div><label class="block text-sm font-medium text-gray-700 mb-1">বিবরণ</label><textarea id="ep-desc" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900" rows="2">' + p.description + '</textarea></div>' +
    '</div>' +
    '<div class="flex gap-2 mt-4"><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-medium">বাতিল</button>' +
    '<button type="button" onclick="saveProductEdit(' + id + ')" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold">আপডেট</button></div></div>');
}

function saveProductEdit(id) {
  var p = DEFAULT_DATA.products.find(function(x) { return x.id === id; });
  if (!p) return;
  p.name = document.getElementById('ep-name').value.trim();
  p.category = document.getElementById('ep-category').value;
  p.stock = parseInt(document.getElementById('ep-stock').value) || 0;
  p.price = parseFloat(document.getElementById('ep-price').value) || 0;
  p.originalPrice = parseFloat(document.getElementById('ep-original').value) || 0;
  p.description = document.getElementById('ep-desc').value.trim();
  
  var imageFile = document.getElementById('ep-image-file');
  if (imageFile && imageFile.files && imageFile.files[0]) {
    handleFileUpload('ep-image-file', function(dataUrl) {
      p.image = dataUrl;
      finishProductEdit(id, p);
    });
  } else {
    var imageUrl = document.getElementById('ep-image').value.trim();
    if (imageUrl) p.image = imageUrl;
    var videoFile = document.getElementById('ep-video-file');
    if (videoFile && videoFile.files && videoFile.files[0]) {
      handleFileUpload('ep-video-file', function(dataUrl) {
        p.video = dataUrl;
        finishProductEdit(id, p);
      });
    } else {
      var videoUrl = document.getElementById('ep-video').value.trim();
      p.video = videoUrl;
      finishProductEdit(id, p);
    }
  }
}

function finishProductEdit(id, p) {
  saveData();
  closeModal();
  showToast('প্রোডাক্ট আপডেট হয়েছে!', 'success');
  renderApp();
}

function deleteProduct(id) {
  if (!confirm('এই প্রোডাক্ট ডিলিট করবেন?')) return;
  DEFAULT_DATA.products = DEFAULT_DATA.products.filter(function(p) { return p.id !== id; });
  saveData();
  showToast('প্রোডাক্ট ডিলিট হয়েছে', 'info');
  renderApp();
}

function toggleUserVerify(id) {
  var u = DEFAULT_DATA.users.find(function(x) { return x.id === id; });
  if (u) { u.verified = !u.verified; saveData(); showToast(u.verified ? 'ভেরিফাইড হয়েছে' : 'আনভেরিফাইড হয়েছে', 'success'); renderApp(); }
}

function resetUserPassword(id) {
  var u = DEFAULT_DATA.users.find(function(x) { return x.id === id; });
  if (!u) return;
  var newPass = prompt(u.name + ' এর নতুন পাসওয়ার্ড দিন:');
  if (newPass && newPass.length >= 6) { u.password = newPass; saveData(); showToast('পাসওয়ার্ড রিসেট হয়েছে', 'success'); }
}

function deleteUser(id) {
  if (!confirm('ইউজার ডিলিট করবেন?')) return;
  DEFAULT_DATA.users = DEFAULT_DATA.users.filter(function(u) { return u.id !== id; });
  saveData();
  showToast('ইউজার ডিলিট হয়েছে', 'info');
  renderApp();
}

function sendBroadcast() {
  var target = document.getElementById('broadcast-target').value;
  var message = document.getElementById('broadcast-message').value.trim();
  if (!message) { showToast('মেসেজ লিখুন!', 'error'); return; }
  if (target === 'all') {
    notifyAllUsers(message, 'info');
  } else {
    addNotification(parseInt(target), message, 'info');
  }
  saveData();
  showToast('নোটিফিকেশন পাঠানো হয়েছে!', 'success');
  document.getElementById('broadcast-message').value = '';
}

function renderNotifications() {
  var notifs = DEFAULT_DATA.notifications.filter(function(n) { return n.userId === state.currentUser.id; }).reverse();
  var html = '<p class="text-gray-500 text-center py-12">কোনো নোটিফিকেশন নেই</p>';
  if (notifs.length > 0) {
    html = '<div class="space-y-2">';
    for (var i = 0; i < notifs.length; i++) {
      var n = notifs[i];
      var icon = n.type === 'success' ? '✅' : (n.type === 'error' ? '❌' : 'ℹ️');
      html += '<div class="bg-white rounded-xl p-4 shadow-sm border ' + (n.read ? 'border-gray-100' : 'border-l-4 border-l-indigo-500 border-gray-100') + ' flex items-start gap-3">' +
        '<div class="text-2xl">' + icon + '</div>' +
        '<div class="flex-1"><p class="' + (n.read ? 'text-gray-600' : 'font-semibold text-gray-900') + '">' + n.message + '</p>' +
        '<p class="text-xs text-gray-400 mt-1">' + new Date(n.createdAt).toLocaleString() + '</p></div>' +
        (!n.read ? '<button type="button" onclick="markRead(' + n.id + ')" class="text-xs text-indigo-600 font-medium">পড়া</button>' : '') +
        '</div>';
    }
    html += '</div>';
  }
  return '<div class="fade-in"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-900">নোটিফিকেশন</h2>' +
    '<button type="button" onclick="markAllRead()" class="text-indigo-600 hover:underline text-sm font-medium">সব পড়া</button></div>' + html + '</div>';
}

function markRead(id) {
  var n = DEFAULT_DATA.notifications.find(function(x) { return x.id === id; });
  if (n) n.read = true;
  saveData();
  renderApp();
}

function markAllRead() {
  var notifs = DEFAULT_DATA.notifications.filter(function(n) { return n.userId === state.currentUser.id; });
  for (var i = 0; i < notifs.length; i++) notifs[i].read = true;
  saveData();
  showToast('সব নোটিফিকেশন পড়া হয়েছে', 'success');
  renderApp();
}

function addToCart(id) {
  var p = DEFAULT_DATA.products.find(function(x) { return x.id === id; });
  if (!p || p.stock === 0) return;
  var existing = state.cart.find(function(c) { return c.id === id; });
  if (existing) { existing.qty++; } else { state.cart.push({ id: id, qty: 1 }); }
  saveData();
  showToast('কার্টে যোগ হয়েছে!', 'success');
  renderApp();
}

function updateCartQty(id, delta) {
  var item = state.cart.find(function(c) { return c.id === id; });
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) state.cart = state.cart.filter(function(c) { return c.id !== id; });
  saveData();
  renderApp();
}

function removeFromCart(id) {
  state.cart = state.cart.filter(function(c) { return c.id !== id; });
  saveData();
  showToast('কার্ট থেকে সরানো হয়েছে', 'info');
  renderApp();
}

function toggleWishlist(id) {
  var idx = state.wishlist.indexOf(id);
  if (idx !== -1) { state.wishlist.splice(idx, 1); showToast('উইশলিস্ট থেকে সরানো হয়েছে', 'info'); }
  else { state.wishlist.push(id); showToast('উইশলিস্টে যোগ হয়েছে ❤️', 'success'); }
  saveData();
  renderApp();
}

function showCheckout() {
  showModal('<div class="p-6"><h2 class="text-2xl font-bold mb-4 text-gray-900">চেকআউট</h2>' +
    '<div class="space-y-4"><div><label class="block text-sm font-medium mb-1 text-gray-700">পেমেন্ট মেথড</label>' +
    '<select id="checkout-payment" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"><option value="COD">ক্যাশ অন ডেলিভারি</option><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select></div>' +
    '<div><label class="block text-sm font-medium mb-1 text-gray-700">অর্ডার নোট</label><textarea id="checkout-note" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900" rows="2"></textarea></div></div>' +
    '<div class="flex gap-2 mt-6"><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-medium">বাতিল</button><button type="button" onclick="placeOrder()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold">কনফার্ম</button></div></div>');
}

// 🔥 অর্ডার প্লেস - রিয়েল-টাইম ব্রডকাস্ট সহ
function placeOrder() {
  var payment = document.getElementById('checkout-payment').value;
  var note = document.getElementById('checkout-note').value;
  var subtotal = 0;
  for (var i = 0; i < state.cart.length; i++) {
    var c = state.cart[i];
    var p = DEFAULT_DATA.products.find(function(x) { return x.id === c.id; });
    if (p) subtotal += p.price * c.qty;
  }
  var order = { 
    id: Date.now(), 
    userId: state.currentUser.id, 
    items: JSON.parse(JSON.stringify(state.cart)), 
    payment: payment, 
    note: note, 
    subtotal: subtotal, 
    shipping: 60, 
    total: subtotal + 60, 
    status: 'Pending', 
    createdAt: new Date().toISOString().split('T')[0] 
  };
  DEFAULT_DATA.orders.push(order);
  for (var j = 0; j < state.cart.length; j++) {
    var item = state.cart[j];
    var prod = DEFAULT_DATA.products.find(function(x) { return x.id === item.id; });
    if (prod) prod.stock = Math.max(0, prod.stock - item.qty);
  }
  state.cart = [];
  saveData();
  
  // 🔥 গুরুত্বপূর্ণ: অন্য সব ট্যাব/ডিভাইসকে নতুন অর্ডারের জানান
  broadcastSync({
    type: 'NEW_ORDER',
    order: order
  });
  
  closeModal();
  showToast('অর্ডার সফল! 🎉', 'success');
  addNotification(state.currentUser.id, 'অর্ডার #' + order.id + ' প্লেস হয়েছে!', 'success');
  renderApp();
}

function requestWithdraw() {
  var method = document.getElementById('withdraw-method').value;
  var amount = parseFloat(document.getElementById('withdraw-amount').value);
  var account = document.getElementById('withdraw-account').value.trim();
  if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন!', 'error'); return; }
  if (!account) { showToast('অ্যাকাউন্ট নম্বর দিন!', 'error'); return; }
  if (amount > state.currentUser.balance) { showToast('পর্যাপ্ত ব্যালেন্স নেই!', 'error'); return; }
  state.currentUser.balance -= amount;
  var u = DEFAULT_DATA.users.find(function(x) { return x.id === state.currentUser.id; });
  if (u) u.balance = state.currentUser.balance;
  DEFAULT_DATA.transactions.push({ id: Date.now(), userId: state.currentUser.id, type: 'উইথড্র রিকোয়েস্ট (' + method + ')', amount: -amount, date: new Date().toISOString().split('T')[0] });
  DEFAULT_DATA.withdrawals.push({ id: Date.now(), userId: state.currentUser.id, method: method, amount: amount, account: account, status: 'Pending', date: new Date().toISOString().split('T')[0] });
  addNotification(state.currentUser.id, '৳' + amount + ' উইথড্র রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে (' + method + ')। অ্যাডমিন শীঘ্রই অনুমোদন করবে।', 'info');
  saveData();
  showToast('উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!', 'success');
  renderApp();
}

function saveProfile() {
  var name = document.getElementById('prof-name').value.trim();
  var email = document.getElementById('prof-email').value.trim();
  var phone = document.getElementById('prof-phone').value.trim();
  var shopName = document.getElementById('prof-shop').value.trim();
  if (!name || !email || !phone) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; }
  
  state.currentUser.name = name; state.currentUser.email = email; state.currentUser.phone = phone; state.currentUser.shopName = shopName;
  var user = DEFAULT_DATA.users.find(function(u) { return u.id === state.currentUser.id; });
  if (user) { user.name = name; user.email = email; user.phone = phone; user.shopName = shopName; }
  
  var oldPass = document.getElementById('prof-old-pass').value;
  var newPass = document.getElementById('prof-new-pass').value;
  if (oldPass || newPass) {
    if (oldPass !== state.currentUser.password) {
      showToast('বর্তমান পাসওয়ার্ড ভুল!', 'error');
      return;
    }
    if (newPass.length < 6) {
      showToast('নতুন পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error');
      return;
    }
    state.currentUser.password = newPass;
    if (user) user.password = newPass;
    addNotification(state.currentUser.id, 'আপনার পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে।', 'info');
    showToast('পাসওয়ার্ড পরিবর্তন হয়েছে!', 'success');
  }
  
  saveData();
  showToast('প্রোফাইল আপডেট হয়েছে!', 'success');
  renderApp();
}

function toggleMobileMenu() {
  var menu = document.getElementById('mobile-menu');
  if (menu) menu.classList.toggle('hidden');
}

function scrollToSection(id) {
  state.currentView = 'home';
  renderApp();
  setTimeout(function() {
    var el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

function renderApp() {
  var app = document.getElementById('app');
  if (!state.currentUser) {
    if (state.currentView === 'login') app.innerHTML = renderLogin();
    else if (state.currentView === 'register') app.innerHTML = renderRegister();
    else app.innerHTML = renderHome();
  } else {
    app.innerHTML = renderDashboard();
  }
  window.scrollTo(0, 0);
}

// অটো-রিফ্রেশ: প্রতি ৩ সেকেন্ডে ডাটা চেক (ব্যাকআপ সিন্ক)
setInterval(function() {
  try {
    var saved = localStorage.getItem('ohds_data');
    if (saved) {
      var parsed = JSON.parse(saved);
      var newOrderCount = (parsed.orders || []).length;
      if (newOrderCount > state.lastOrderCount) {
        // নতুন অর্ডার এসেছে
        var newOrders = parsed.orders.slice(state.lastOrderCount);
        state.lastOrderCount = newOrderCount;
        state.newOrderIds = newOrders.map(function(o) { return o.id; });
        
        DEFAULT_DATA.orders = parsed.orders;
        
        if (state.currentUser && (state.currentUser.role === 'CEO' || state.currentUser.role === 'Admin')) {
          showNewOrderPopup(newOrders);
          playOrderSound();
        }
        
        if (state.currentUser) {
          var updatedUser = DEFAULT_DATA.users.find(function(u) { return u.id === state.currentUser.id; });
          if (updatedUser) state.currentUser = updatedUser;
        }
        
        renderApp();
      }
    }
  } catch(e) {}
}, 3000);

loadData();
renderApp();
</script>
