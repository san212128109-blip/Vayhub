function loadData() {
  try {
    const savedUser = localStorage.getItem('ohds_current_user');
    if (savedUser) {
      state.currentUser = JSON.parse(savedUser);
      state.currentView = 'dashboard';
      state.dashboardView = 'home';
    }
    const savedCart = localStorage.getItem('ohds_cart');
    if (savedCart) state.cart = JSON.parse(savedCart);
    const savedWishlist = localStorage.getItem('ohds_wishlist');
    if (savedWishlist) state.wishlist = JSON.parse(savedWishlist);
    setupRealtimeListeners();
    initializeFirebaseData();
  } catch(e) { console.error('Load error:', e); }
}

function setupRealtimeListeners() {
  database.ref('orders').on('value', (snapshot) => {
    const data = snapshot.val();
    DEFAULT_DATA.orders = data ? Object.values(data) : [];
    if (state.currentView === 'dashboard') renderApp();
  });

  database.ref('users').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      DEFAULT_DATA.users = Object.values(data);
      if (state.currentUser) {
        const updatedUser = DEFAULT_DATA.users.find(u => u && u.id == state.currentUser.id);
        if (updatedUser) {
          state.currentUser = updatedUser;
          localStorage.setItem('ohds_current_user', JSON.stringify(updatedUser));
        }
      }
      if (state.currentView === 'dashboard') renderApp();
    }
  });

  database.ref('products').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      DEFAULT_DATA.products = Object.values(data);
      if (state.currentView === 'dashboard') renderApp();
    }
  });

  database.ref('notifications').on('value', (snapshot) => {
    const data = snapshot.val();
    DEFAULT_DATA.notifications = data ? Object.values(data) : [];
  });

  database.ref('withdrawals').on('value', (snapshot) => {
    const data = snapshot.val();
    DEFAULT_DATA.withdrawals = data ? Object.values(data) : [];
  });

  database.ref('transactions').on('value', (snapshot) => {
    const data = snapshot.val();
    DEFAULT_DATA.transactions = data ? Object.values(data) : [];
  });

  database.ref('subscriptions').on('value', (snapshot) => {
    const data = snapshot.val();
    DEFAULT_DATA.subscriptions = data ? Object.values(data) : [];
    if (state.currentView === 'dashboard') renderApp();
  });

  showToast('Firebase সংযুক্ত হয়েছে!', 'success');
}

function initializeFirebaseData() {
  database.ref('users').once('value').then((snapshot) => {
    if (!snapshot.exists()) {
      const usersObj = {};
      DEFAULT_DATA.users.forEach(u => { usersObj[u.id] = u; });
      database.ref('users').set(usersObj);
    }
  });

  database.ref('products').once('value').then((snapshot) => {
    if (!snapshot.exists()) {
      const productsObj = {};
      DEFAULT_DATA.products.forEach(p => { productsObj[p.id] = p; });
      database.ref('products').set(productsObj);
    }
  });
}

function showToast(message, type) {
  type = type || 'success';
  const container = document.getElementById('toast-container');
  container.innerHTML = '';
  const toast = document.createElement('div');
  const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
  toast.className = colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg toast-enter flex items-center gap-2 min-w-[250px]';
  const icons = { success: '✓', error: '✗', info: 'ℹ', warning: '⚠' };
  toast.innerHTML = '<span class="text-xl font-bold">' + icons[type] + '</span><span class="font-medium">' + message + '</span>';
  container.appendChild(toast);
  setTimeout(function() { 
    toast.style.opacity = '0'; 
    toast.style.transition = 'opacity 0.3s'; 
    setTimeout(function() { if(toast.parentNode) toast.remove(); }, 300); 
  }, 3000);
}

function addNotification(userId, message, type) {
  const notif = {
    id: Date.now() + Math.floor(Math.random()*1000),
    userId: userId,
    message: message,
    type: type || 'info',
    read: false,
    createdAt: new Date().toISOString()
  };
  database.ref('notifications/' + notif.id).set(notif);
}

function notifyAllUsers(message, type) {
  for (var i = 0; i < DEFAULT_DATA.users.length; i++) {

}

function uploadToImgBB(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var base64Image = e.target.result.split(',')[1];
      var formData = new FormData();
      formData.append('image', base64Image);
      
      fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          resolve(data.data.url);
        } else {
          reject(new Error('Upload failed'));
        }
      })
      .catch(error => reject(error));
    };
    reader.readAsDataURL(file);
  });
}

function downloadFile(fileUrl, filename) {
  if (!fileUrl) {
    showToast('ডাউনলোড করার মতো কিছু নেই!', 'error');
    return;
  }
  var link = document.createElement('a');
  link.href = fileUrl;
  link.download = filename || 'download';
  link.target = '_blank';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('ডাউনলোড শুরু হয়েছে!', 'success');
}

function doLogin() {
  try {
    var emailInput = document.getElementById('login-email');
    var passwordInput = document.getElementById('login-password');
    if (!emailInput || !passwordInput) { showToast('ফর্ম লোড হয়নি! পেজ রিফ্রেশ করুন।', 'error'); return; }
    var email = emailInput.value.trim();
    var password = passwordInput.value;
    if (!email || !password) { showToast('ইমেইল এবং পাসওয়ার্ড দিন!', 'error'); return; }
    var user = DEFAULT_DATA.users.find(function(u) { 
      return u && ((u.email === email || u.username === email) && u.password === password); 
    });
    if (user) {
      state.currentUser = user;
      state.currentView = 'dashboard';
      state.dashboardView = 'home';
      saveData();
      showToast('সফলভাবে লগইন হয়েছে! স্বাগতম ' + (user.name || ''), 'success');
      renderApp();
    } else {
      showToast('ভুল ইমেইল/ইউজারনেম বা পাসওয়ার্ড!', 'error');
    }
  } catch(e) { showToast('লগইন error: ' + e.message, 'error'); }
}

var forgotOTP = '';
var forgotUser = null;

function sendForgotOTP() {
  var email = document.getElementById('forgot-email').value.trim();
  forgotUser = DEFAULT_DATA.users.find(function(u) { return u && u.email === email; });
  if (!forgotUser) { showToast('ইউজার খুঁজে পাওয়া যায়নি!', 'error'); return; }
  forgotOTP = Math.floor(100000 + Math.random() * 900000).toString();
  document.getElementById('forgot-otp-display').textContent = forgotOTP;
  document.getElementById('forgot-step-1').classList.add('hidden');
  document.getElementById('forgot-step-2').classList.remove('hidden');
  showToast('OTP পাঠানো হয়েছে!', 'info');
}

function resetPassword() {
  var otp = document.getElementById('forgot-otp').value;
  var newPass = document.getElementById('forgot-new-password').value;
  if (otp !== forgotOTP) { showToast('ভুল OTP!', 'error'); return; }
  if (newPass.length < 6) { showToast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error'); return; }
  forgotUser.password = newPass;
  database.ref('users/' + forgotUser.id).update({ password: newPass });
  closeModal();
  showToast('পাসওয়ার্ড সফলভাবে রিসেট হয়েছে!', 'success');
}

function doRegister() {
  try {
    var name = document.getElementById('reg-name').value.trim();
    var email = document.getElementById('reg-email').value.trim();
    var phone = document.getElementById('reg-phone').value.trim();
    var address = document.getElementById('reg-address').value.trim();
    var password = document.getElementById('reg-password').value;
    var confirm = document.getElementById('reg-confirm').value;
    if (!name || !email || !phone || !address) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; }
    if (password !== confirm) { showToast('পাসওয়ার্ড মিলছে না!', 'error'); return; }
    if (password.length < 6) { showToast('পাসওয়ার্ড কমপক্ষে  অক্ষর!', 'error'); return; }
    if (DEFAULT_DATA.users.find(function(u) { return u && u.email === email; })) { showToast('এই ইমেইল ইতিমধ্যে ব্যবহৃত!', 'error'); return; }
    var newUser = {
      id: Date.now(),
      name: name, email: email, phone: phone,
      username: email.split('@')[0],
      password: password,
      role: 'Customer',
      balance: 0, verified: false,
      shopName: '', address: address,
      createdAt: new Date().toISOString().split('T')[0],
      credits: 100,
      subscribed: false
    };
    database.ref('users/' + newUser.id).set(newUser).then(() => {
      state.currentUser = newUser;
      state.currentView = 'dashboard';
      state.dashboardView = 'home';
      saveData();
      showToast('রেজিস্ট্রেশন সফল! স্বাগতম ' + name, 'success');
      renderApp();
    }).catch(err => {
      showToast('এরর: ' + err.message, 'error');
    });
  } catch(e) { showToast('রেজিস্ট্রেশন error: ' + e.message, 'error'); }
}

function renderDashboard() {
  if (!state.currentUser) { state.currentView = 'login'; renderApp(); return; }
  var u = state.currentUser;
  var unreadNotifs = DEFAULT_DATA.notifications.filter(function(n) { return n && n.userId === u.id && !n.read; }).length;
  return '<div class="min-h-screen flex flex-col md:flex-row bg-slate-50">' + renderSidebar() + '<div class="flex-1 flex flex-col min-h-screen md:ml-0">' + renderTopbar(unreadNotifs) + '<main class="flex-1 p-4 md:p-6 overflow-auto">' + renderDashboardContent() + '</main><footer class="bg-white border-t border-gray-100 py-4 px-6 text-center text-sm text-gray-500">© 2026 সর্বস্বত্ব সংরক্ষিত।</footer></div></div>';
}

function renderSidebar() {
  var u = state.currentUser;
  var isAdmin = (u.role === 'CEO' || u.role === 'Admin');
  var menuItems = [
    { id: 'home', icon: '', label: 'হোম' },
    { id: 'products', icon: '📦', label: 'প্রোডাক্টস' },
    { id: 'cart', icon: '🛒', label: 'কার্ট (' + state.cart.length + ')' },
    { id: 'orders', icon: '📋', label: 'অর্ডার' },
    { id: 'wishlist', icon: '❤️', label: 'উইশলিস্ট' },
    { id: 'wallet', icon: '💰', label: 'ওয়ালেট' },
    { id: 'profile', icon: '👤', label: 'প্রোফাইল' },
    { id: 'packages', icon: '🎁', label: 'প্যাকেজ' }
  ];
  if (isAdmin) {
    menuItems.push({ id: 'admin', icon: '⚙️', label: 'অ্যাডমিন প্যানেল' });
  }
  var sidebarClass = state.sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0';
  var html = '<aside class="sidebar-bg text-white w-64 flex-shrink-0 flex flex-col fixed md:relative inset-y-0 left-0 z-40 transition-transform duration-300 ease-in-out ' + sidebarClass + '"><div class="p-4 border-b border-gray-800 flex justify-between items-center md:justify-start"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-bold">' + (u.name ? u.name.charAt(0) : '?') + '</div><div><p class="font-semibold text-sm">' + (u.name || 'User') + '</p><p class="text-xs text-gray-400">' + (u.role || 'Customer') + ' • ' + (u.verified ? '✅ Verified' : '⚠️ Unverified') + '</p></div></div><button type="button" onclick="state.sidebarOpen=false;renderApp();" class="md:hidden text-gray-400 hover:text-white text-xl">✕</button></div><div class="mt-3 bg-gray-800 rounded-lg p-3 flex justify-between items-center mx-4"><div><p class="text-xs text-gray-400">ব্যালেন্স</p><p class="text-xl font-bold text-white">৳' + (u.balance || 0) + '</p></div><span class="text-xs bg-green-600 px-2 py-1 rounded">Active</span></div><nav class="flex-1 p-2 space-y-1 overflow-y-auto">';
  for (var i = 0; i < menuItems.length; i++) {
    var m = menuItems[i];
    var active = state.dashboardView === m.id ? 'active' : '';
    html += '<button type="button" onclick="state.dashboardView=\'' + m.id + '\';state.sidebarOpen=false;state.userDropdown=false;renderApp();" class="sidebar-item ' + active + ' w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm"><span>' + m.icon + '</span><span>' + m.label + '</span></button>';
  }
  html += '</nav><div class="p-2 border-t border-gray-800 space-y-1"><button type="button" onclick="doLogout()" class="sidebar-item w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-red-400 hover:bg-red-900 hover:text-red-300"><span></span><span>লগআউট</span></button></div></aside>';
  if (state.sidebarOpen) html += '<div class="fixed inset-0 bg-black bg-opacity-50 z-30 md:hidden" onclick="state.sidebarOpen=false;renderApp();"></div>';
  return html;
}

function renderTopbar(unreadNotifs) {
  var u = state.currentUser;
  var userMenu = state.userDropdown ? '<div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-100 py-2 z-50 notif-dropdown"><div class="px-4 py-2 border-b border-gray-100"><p class="font-semibold text-gray-900 text-sm">' + (u.name || '') + '</p><p class="text-xs text-gray-500">' + (u.email || '') + '</p></div><button type="button" onclick="state.dashboardView=\'profile\';state.userDropdown=false;renderApp();" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">👤 প্রোফাইল</button><button type="button" onclick="doLogout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-50">🚪 লগআউট</button></div>' : '';
  var notifMenu = '';
  if (state.notifDropdown) {
    var userNotifs = DEFAULT_DATA.notifications.filter(function(n) { return n && n.userId === u.id; }).reverse().slice(0, 10);
    notifMenu = '<div class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg border border-gray-100 z-50 notif-dropdown max-h-96 overflow-y-auto"><div class="p-3 border-b border-gray-100 flex justify-between items-center"><h3 class="font-bold text-gray-900">নোটিফিকেশন</h3><button type="button" onclick="markAllRead()" class="text-xs text-indigo-600 hover:underline">সব পড়া</button></div>';
    if (userNotifs.length === 0) {
      notifMenu += '<div class="p-6 text-center text-gray-500"><p class="text-3xl mb-2">🔔</p><p class="text-sm">কোনো নোটিফিকেশন নেই</p></div>';
    } else {
      notifMenu += '<div class="divide-y divide-gray-100">';
      for (var i = 0; i < userNotifs.length; i++) {
        var n = userNotifs[i];
        if (!n) continue;
        var icon = n.type === 'success' ? '✅' : (n.type === 'error' ? '❌' : 'ℹ️');
        notifMenu += '<div class="p-3 hover:bg-gray-50 ' + (n.read ? '' : 'bg-blue-50') + '"><div class="flex items-start gap-2"><span class="text-lg">' + icon + '</span><div class="flex-1"><p class="text-sm ' + (n.read ? 'text-gray-600' : 'font-semibold text-gray-900') + '">' + (n.message || '') + '</p><p class="text-xs text-gray-400 mt-1">' + new Date(n.createdAt).toLocaleString() + '</p></div>' + (!n.read ? '<button type="button" onclick="markRead(' + n.id + ')" class="text-xs text-indigo-600">পড়া</button>' : '') + '</div></div>';
      }
      notifMenu += '</div>';
    }
    notifMenu += '<div class="p-2 border-t border-gray-100"><button type="button" onclick="state.dashboardView=\'notifications\';state.notifDropdown=false;renderApp();" class="w-full text-center text-sm text-indigo-600 hover:underline font-medium">সব নোটিফিকেশন দেখুন →</button></div></div>';
  }
  return '<header class="bg-white border-b border-gray-100 px-4 md:px-6 py-3 flex items-center justify-between sticky top-0 z-20"><div class="flex items-center gap-4 flex-1"><button type="button" onclick="state.sidebarOpen=true;renderApp();" class="md:hidden text-gray-600 text-2xl">☰</button><h1 class="text-lg font-bold text-gray-900 hidden md:block">ড্যাশবোর্ড</h1><div class="relative flex-1 max-w-md"><span class="absolute left-3 top-2.5 text-gray-400">🔍</span><input type="text" class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-900 focus:ring-2 focus:ring-indigo-500" placeholder="প্রোডাক্ট খুঁজুন..."></div></div><div class="flex items-center gap-3"><div class="relative"><button type="button" onclick="state.notifDropdown=!state.notifDropdown;state.userDropdown=false;renderApp();" class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg">🔔' + (unreadNotifs > 0 ? '<span class="absolute top-0 right-0 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center">' + unreadNotifs + '</span>' : '') + '</button>' + notifMenu + '</div><div class="relative"><button type="button" onclick="state.userDropdown=!state.userDropdown;state.notifDropdown=false;renderApp();" class="flex items-center gap-2 p-1 hover:bg-gray-100 rounded-lg"><div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm">' + (u.name ? u.name.charAt(0) : '?') + '</div><span class="hidden md:block text-sm font-medium text-gray-700">' + (u.name || '') + '</span><span class="text-gray-400 text-xs">▼</span></button>' + userMenu + '</div></div></header>';
}

function renderDashboardContent() {
  switch(state.dashboardView) {
    case 'home': return renderDashHome();
    case 'products': return renderDashProducts();
    case 'cart': return renderDashCart();
    case 'orders': return renderDashOrders();
    case 'wishlist': return renderDashWishlist();
    case 'wallet': return renderDashWallet();
    case 'profile': return renderDashProfile();
    case 'packages': return renderPackages();
    case 'admin': return renderAdminPanel();
    case 'notifications': return renderNotifications();
    default: return renderDashHome();
  }
}

function renderDashHome() {
  var u = state.currentUser;
  var userOrders = DEFAULT_DATA.orders.filter(function(o) { return o && o.userId === u.id; });
  var pending = userOrders.filter(function(o) { return o.status === 'Pending'; }).length;
  var delivered = userOrders.filter(function(o) { return o.status === 'Done' || o.status === 'Received'; }).length;
  var stats = [
    { icon: '📦', label: 'মোট অর্ডার', value: userOrders.length, color: 'bg-indigo-50 text-indigo-600' },
    { icon: '⏰', label: 'পেন্ডিং', value: pending, color: 'bg-amber-50 text-amber-600' },
    { icon: '✅', label: 'সম্পন্ন', value: delivered, color: 'bg-green-50 text-green-600' },
    { icon: '🛒', label: 'কার্ট', value: state.cart.length, color: 'bg-purple-50 text-purple-600' }
  ];
  var html = '<div class="fade-in"><div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4"><div><h2 class="text-2xl font-black text-gray-900">স্বাগতম, ' + (u.name || '') + ' 👋</h2><p class="text-gray-600 text-sm">আজকের ব্যবসার সারসংক্ষেপ</p></div><button type="button" onclick="state.dashboardView=\'products\';renderApp();" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700">+ নতুন অর্ডার</button></div>';
  html += '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">';
  for (var i = 0; i < stats.length; i++) {
    var s = stats[i];
    html += '<div class="bg-white rounded-xl p-4 border border-gray-100 shadow-sm"><div class="w-10 h-10 ' + s.color + ' rounded-lg flex items-center justify-center text-xl mb-2">' + s.icon + '</div><p class="text-2xl font-bold text-gray-900">' + s.value + '</p><p class="text-xs text-gray-500">' + s.label + '</p></div>';
  }
  html += '</div>';
  html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"><div class="bg-slate-900 text-white rounded-xl p-5"><p class="text-sm text-gray-400 mb-1">বর্তমান ব্যালেন্স</p><p class="text-3xl font-black">৳' + (u.balance || 0) + '</p><p class="text-xs text-gray-400 mt-2">উত্তোলনযোগ্য</p></div><div class="bg-indigo-600 text-white rounded-xl p-5"><p class="text-sm text-indigo-200 mb-1">মোট প্রফিট</p><p class="text-3xl font-black">৳0</p><p class="text-xs text-indigo-200 mt-2">সর্বমোট আয়</p></div><div class="bg-green-600 text-white rounded-xl p-5"><p class="text-sm text-green-200 mb-1">ক্রেডিট</p><p class="text-3xl font-black">' + (u.credits || 0) + '</p><p class="text-xs text-green-200 mt-2">ব্যবহারযোগ্য</p></div></div>';
  html += '<div class="bg-white rounded-xl p-6 border border-gray-100 shadow-sm"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-gray-900">সাম্প্রতিক অর্ডার</h3><button type="button" onclick="state.dashboardView=\'orders\';renderApp();" class="text-indigo-600 text-sm font-medium">সব দেখুন →</button></div>';
  if (userOrders.length === 0) {
    html += '<div class="text-center py-8 text-gray-400"><p class="text-4xl mb-2">📭</p><p>এখানে কোনো অর্ডার নেই</p><button type="button" onclick="state.dashboardView=\'products\';renderApp();" class="text-indigo-600 text-sm mt-2 font-medium">প্রোডাক্ট দেখুন →</button></div>';
  } else {
    html += '<div class="space-y-2">';
    var recent = userOrders.slice(-5).reverse();
    for (var j = 0; j < recent.length; j++) {
      var o = recent[j];
      if (!o) continue;
      html += '<div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg"><div><p class="font-semibold text-sm text-gray-900">#' + o.id + '</p><p class="text-xs text-gray-500">' + (o.createdAt || '') + '</p></div><span class="text-xs px-2 py-1 rounded-full ' + getStatusColor(o.status) + '">' + (o.status || '') + '</span></div>';
    }
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function renderDashProducts() {
  var products = DEFAULT_DATA.products.filter(p => p);
  if (state.selectedCategory !== 'all') products = products.filter(function(p) { return p.category === state.selectedCategory; });
  if (state.searchQuery) {
    var q = state.searchQuery.toLowerCase();
    products = products.filter(function(p) { return p.name && p.name.toLowerCase().indexOf(q) !== -1; });
  }
  var cats = ['all', 'T-shirt', 'Shirt', 'Pants', 'Electronics'];
  var catHtml = '';
  for (var i = 0; i < cats.length; i++) {
    var c = cats[i];
    var cls = (state.selectedCategory === c) ? 'bg-indigo-600 text-white' : 'bg-white text-gray-700 border border-gray-200';
    var label = (c === 'all') ? 'সব' : c;
    catHtml += '<button type="button" onclick="state.selectedCategory=\'' + c + '\';renderApp();" class="px-4 py-2 rounded-full whitespace-nowrap ' + cls + '">' + label + '</button>';
  }
  var prodHtml = '';
  for (var j = 0; j < products.length; j++) prodHtml += renderDashProductCard(products[j]);
  return '<div class="fade-in"><div class="mb-6"><input type="text" value="' + (state.searchQuery || '') + '" oninput="state.searchQuery=this.value;renderApp();" class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-lg text-gray-900 bg-white" placeholder="প্রোডাক্ট খুঁজুন..."></div><div class="flex gap-2 overflow-x-auto pb-2 mb-6">' + catHtml + '</div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">' + prodHtml + '</div></div>';
}

function renderDashProductCard(p) {
  if (!p) return '';
  var discount = Math.round((1 - p.price / p.originalPrice) * 100);
  var inWishlist = state.wishlist.indexOf(p.id) !== -1;
  var inCart = state.cart.find(function(c) { return c.id === p.id; });
  var hasVideo = p.video ? true : false;
  
  var html = '<div class="product-card">';
  html += '<div class="relative">';
  html += '<img src="' + (p.image || 'https://via.placeholder.com/300x200?text=No+Image') + '" class="w-full h-48 object-cover" onerror="this.src=\'https://via.placeholder.com/300x200?text=No+Image\'">';
  if (discount > 0) html += '<span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded font-bold">' + discount + '% OFF</span>';
  if (hasVideo) html += '<span class="absolute top-2 right-12 bg-purple-500 text-white text-xs px-2 py-1 rounded font-bold">🎬 ভিডিও</span>';
  html += '<button type="button" onclick="toggleWishlist(' + p.id + ')" class="absolute top-2 right-2 bg-white p-2 rounded-full shadow">' + (inWishlist ? '❤️' : '🤍') + '</button>';
  html += '</div>';
  
  html += '<div class="p-4">';
  html += '<p class="text-xs text-gray-500 mb-1">' + (p.category || '') + '</p>';
  html += '<h3 class="font-semibold text-gray-900 truncate mb-2">' + (p.name || '') + '</h3>';
  html += '<div class="flex items-center gap-2 mb-2">';
  html += '<span class="text-lg font-bold text-indigo-600">' + (p.price || 0) + '</span>';
  html += '<span class="text-sm text-gray-400 line-through">৳' + (p.originalPrice || 0) + '</span>';
  html += '</div>';
  html += '<p class="text-xs text-green-600 mb-3">স্টক: ' + (p.stock || 0) + '</p>';
  
  html += '<div class="flex gap-2 mb-2">';
  if (p.image && p.downloadable !== false) {
    html += '<button type="button" onclick="downloadFile(\'' + p.image + '\', \'' + (p.name || 'image').replace(/[^a-zA-Z0-9]/g, '_') + '.jpg\')" class="flex-1 text-xs bg-blue-100 text-blue-700 px-2 py-1.5 rounded hover:bg-blue-200 font-medium">📥 ছবি</button>';
  }
  if (p.video && p.downloadable !== false) {
    html += '<button type="button" onclick="downloadFile(\'' + p.video + '\', \'' + (p.name || 'video').replace(/[^a-zA-Z0-9]/g, '_') + '.mp4\')" class="flex-1 text-xs bg-purple-100 text-purple-700 px-2 py-1.5 rounded hover:bg-purple-200 font-medium">📥 ভিডিও</button>';
  }
  html += '</div>';
  
  html += '<button type="button" onclick="addToCart(' + p.id + ')" ' + (inCart ? 'disabled' : '') + ' class="w-full py-2 rounded-lg font-medium ' + (inCart ? 'bg-green-100 text-green-700' : 'bg-indigo-600 text-white hover:bg-indigo-700') + '">' + (inCart ? '✓ কার্টে আছে' : 'কার্টে যোগ করুন') + '</button>';
  html += '</div></div>';
  
  return html;
}

function renderDashCart() {
  if (state.cart.length === 0) return '<div class="text-center py-12 fade-in"><p class="text-gray-500 text-lg mb-4">কার্ট খালি</p><button type="button" onclick="state.dashboardView=\'products\';renderApp();" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium">প্রোডাক্ট দেখুন</button></div>';
  var subtotal = 0;
  var itemsHtml = '';
  for (var i = 0; i < state.cart.length; i++) {
    var c = state.cart[i];
    var p = DEFAULT_DATA.products.find(function(x) { return x && x.id === c.id; });
    if (!p) continue;
    subtotal += p.price * c.qty;
    itemsHtml += '<div class="bg-white rounded-xl p-4 shadow-sm flex gap-4 border border-gray-100"><img src="' + (p.image || '') + '" class="w-24 h-24 object-cover rounded-lg"><div class="flex-1"><h3 class="font-semibold text-gray-900">' + (p.name || '') + '</h3><p class="text-sm text-gray-500 mb-2">৳' + (p.price || 0) + '</p><div class="flex items-center gap-2"><button type="button" onclick="updateCartQty(' + p.id + ',-1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">-</button><span class="font-bold w-8 text-center">' + c.qty + '</span><button type="button" onclick="updateCartQty(' + p.id + ',1)" class="w-8 h-8 bg-gray-200 rounded-lg font-bold">+</button><button type="button" onclick="removeFromCart(' + p.id + ')" class="ml-auto text-red-500">🗑️</button></div></div><div class="font-bold text-indigo-600 flex items-center">৳' + (p.price * c.qty) + '</div></div>';
  }
  var shipping = 60;
  var total = subtotal + shipping;
  return '<div class="fade-in"><h2 class="text-2xl font-bold mb-6 text-gray-900">শপিং কার্ট</h2><div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2 space-y-3">' + itemsHtml + '</div><div class="bg-white rounded-xl p-6 shadow-sm h-fit border border-gray-100"><h3 class="font-bold text-lg mb-4 text-gray-900">অর্ডার সামারি</h3><div class="space-y-2 text-sm text-gray-700"><div class="flex justify-between"><span>সাবটোটাল</span><span>৳' + subtotal + '</span></div><div class="flex justify-between"><span>শিপিং</span><span>৳' + shipping + '</span></div><div class="flex justify-between font-bold text-lg border-t pt-2 text-gray-900"><span>মোট</span><span class="text-indigo-600">৳' + total + '</span></div></div><button type="button" onclick="showCheckout()" class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">অর্ডার করুন</button></div></div></div>';
}

function renderDashOrders() {
  var orders = DEFAULT_DATA.orders.filter(function(o) { return o && o.userId === state.currentUser.id; }).reverse();
  var html = '<p class="text-gray-500 text-center py-12">কোনো অর্ডার নেই</p>';
  if (orders.length > 0) {
    html = '<div class="space-y-4">';
    for (var i = 0; i < orders.length; i++) {
      var o = orders[i];
      if (!o) continue;
      html += '<div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100"><div class="flex justify-between items-start mb-3"><div><p class="font-bold text-lg text-gray-900">অর্ডার #' + o.id + '</p><p class="text-sm text-gray-500">' + (o.createdAt || '') + ' • ' + (o.payment || '') + '</p></div><span class="px-3 py-1 rounded-full text-sm font-semibold ' + getStatusColor(o.status) + '">' + (o.status || '') + '</span></div><div class="border-t pt-3 flex justify-between font-bold text-gray-900"><span>মোট</span><span class="text-indigo-600">৳' + (o.total || 0) + '</span></div></div>';
    }
    html += '</div>';
  }
  return '<div class="fade-in"><h2 class="text-2xl font-bold mb-6 text-gray-900">আমার অর্ডার</h2>' + html + '</div>';
}

function renderDashWishlist() {
  var products = DEFAULT_DATA.products.filter(function(p) { return p && state.wishlist.indexOf(p.id) !== -1; });
  if (products.length === 0) return '<div class="text-center py-12 fade-in"><p class="text-gray-500 text-lg">উইশলিস্ট খালি</p></div>';
  var html = '';
  for (var i = 0; i < products.length; i++) html += renderDashProductCard(products[i]);

function submitSubscription() {
  var payment = document.getElementById('sub-payment').value;
  var txn = document.getElementById('sub-txn').value.trim();
  var phone = document.getElementById('sub-phone').value.trim();
  
  if (!txn) { showToast('ট্রানজেকশন ID দিন!', 'error'); return; }
  if (!phone) { showToast('ফোন নম্বর দিন!', 'error'); return; }
  
  var subscription = {
    id: Date.now(),
    userId: state.currentUser.id,
    userName: state.currentUser.name,
    userEmail: state.currentUser.email,
    userPhone: phone,
    amount: 250,
    paymentMethod: payment,
    transactionId: txn,
    status: 'Pending',
    createdAt: new Date().toISOString(),
    date: new Date().toLocaleDateString('bn-BD')
  };
  
  database.ref('subscriptions/' + subscription.id).set(subscription).then(() => {
    addNotification(state.currentUser.id, 'আপনার সাবস্ক্রিপশন রিকোয়েস্ট (৳২৫০) পাঠানো হয়েছে। অ্যাডমিন শীঘ্রই যাচাই করবে।', 'info');
    closeModal();
    showToast('সাবস্ক্রিপশন রিকোয়েস্ট পাঠানো হয়েছে! অ্যাডমিন শীঘ্রই অনুমোদন করবে।', 'success');
    renderApp();
  }).catch(err => {
    showToast('এরর: ' + err.message, 'error');
  });
}

function buyPackage(id) {
  var pkg = DEFAULT_DATA.packages.find(function(p) { return p && p.id === id; });

  showModal('<div class="p-6"><h2 class="text-2xl font-bold mb-4 text-gray-900">' + (pkg.name || '') + ' কিনুন</h2><div class="bg-indigo-50 rounded-lg p-4 mb-4"><p class="font-bold text-gray-900">মূল্য: ৳' + (pkg.price || 0) + '</p><p class="text-sm text-gray-600">' + (pkg.duration || '') + '</p></div><div class="space-y-3 mb-4"><label class="block text-sm font-medium text-gray-700">পেমেন্ট মেথড</label><select id="pkg-payment" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"><option value="bKash">bKash</option><option value="Nagad">Nagad</option><option value="Rocket">Rocket</option></select><label class="block text-sm font-medium text-gray-700">ট্রানজেকশন ID</label><input type="text" id="pkg-txn" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900" placeholder="Transaction ID"></div><div class="flex gap-2"><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-medium">বাতিল</button><button type="button" onclick="confirmPackage(' + id + ')" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-semibold">কনফার্ম</button></div></div>');

function confirmPackage(id) {
  var txn = document.getElementById('pkg-txn').value.trim();
  if (!txn) { showToast('ট্রানজেকশন ID দিন!', 'error'); return; }
  var pkg = DEFAULT_DATA.packages.find(function(p) { return p && p.id === id; });
  state.currentUser.credits = (state.currentUser.credits || 0) + (pkg.id === 1 ? 100 : 200);
  var u = DEFAULT_DATA.users.find(function(x) { return x && x.id === state.currentUser.id; });
  if (u) {
    u.credits = state.currentUser.credits;
    database.ref('users/' + u.id).update({ credits: u.credits });
  }
  saveData();
  closeModal();
  showToast('প্যাকেজ ক্রয় সফল! ক্রেডিট যোগ হয়েছে।', 'success');
  renderApp();
}

function showAdminTab(tabName) {
  var tabs = ['users', 'products', 'orders', 'subscriptions', 'withdrawals', 'broadcast'];
  for (var i = 0; i < tabs.length; i++) {
    var el = document.getElementById('admin-tab-' + tabs[i]);
    var btn = document.getElementById('tab-' + tabs[i]);
    if (el) {
      if (tabs[i] === tabName) {
        el.classList.remove('hidden');
        btn.className = 'px-4 py-2 rounded-t-lg font-medium bg-indigo-600 text-white whitespace-nowrap';
      } else {
        el.classList.add('hidden');
        btn.className = 'px-4 py-2 rounded-t-lg font-medium bg-gray-200 text-gray-700 whitespace-nowrap';
      }
    }
  }
}

function approveSubscription(subId) {
  if (!confirm('এই সাবস্ক্রিপশন অনুমোদন করবেন?')) return;
  
  var sub = DEFAULT_DATA.subscriptions.find(function(s) { return s && s.id === subId; });
  if (!sub) return;
  
  // সাবস্ক্রিপশন স্ট্যাটাস আপডেট
  database.ref('subscriptions/' + subId).update({ status: 'Approved' });
  
  // ইউজারের subscribed স্ট্যাটাস আপডেট
  var user = DEFAULT_DATA.users.find(function(u) { return u && u.id === sub.userId; });
  if (user) {
    database.ref('users/' + sub.userId).update({ subscribed: true });
    addNotification(sub.userId, '🎉 অভিনন্দন! আপনার সাবস্ক্রিপশন (৳২৫০) অনুমোদিত হয়েছে। এখন আপনি প্রিমিয়াম ফিচার ব্যবহার করতে পারবেন!', 'success');
  }
  
  showToast('সাবস্ক্রিপশন অনুমোদিত হয়েছে!', 'success');
  renderApp();
}

function rejectSubscription(subId) {
  if (!confirm('এই সাবস্ক্রিপশন বাতিল করবেন?')) return;
  
  var sub = DEFAULT_DATA.subscriptions.find(function(s) { return s && s.id === subId; });
  if (!sub) return;
  
  database.ref('subscriptions/' + subId).update({ status: 'Rejected' });
  addNotification(sub.userId, ' আপনার সাবস্ক্রিপশন রিকোয়েস্ট (৳২৫০) বাতিল করা হয়েছে। সমস্যার জন্য WhatsApp এ যোগাযোগ করুন।', 'error');
  
  showToast('সাবস্ক্রিপশন বাতিল করা হয়েছে', 'info');
  renderApp();
}

function updateOrderStatus(orderId, newStatus) {
  var order = DEFAULT_DATA.orders.find(function(o) { return o && o.id === orderId; });
  if (order) {
    order.status = newStatus;
    database.ref('orders/' + orderId).update({ status: newStatus });
    showToast('অর্ডার স্ট্যাটাস আপডেট হয়েছে: ' + newStatus, 'success');
    addNotification(order.userId, 'আপনার অর্ডার #' + orderId + ' এর স্ট্যাটাস পরিবর্তন হয়েছে: ' + newStatus, 'info');
  }
}

function updateWithdrawalStatus(withdrawalId, newStatus) {
  var w = DEFAULT_DATA.withdrawals.find(function(x) { return x && x.id === withdrawalId; });
  if (w) {
    var oldStatus = w.status;
    w.status = newStatus;
    if (oldStatus === 'Pending' && newStatus === 'Cancelled') {
      var user = DEFAULT_DATA.users.find(function(u) { return u && u.id === w.userId; });
      if (user) {
        user.balance += w.amount;
        if (state.currentUser && state.currentUser.id === user.id) {
          state.currentUser.balance += w.amount;
        }
        database.ref('users/' + user.id).update({ balance: user.balance });
        addNotification(w.userId, 'আপনার ৳' + w.amount + ' এর উইথড্র রিকোয়েস্ট বাতিল করা হয়েছে এবং টাকা আপনার ব্যালেন্সে ফেরত দেওয়া হয়েছে।', 'info');
      }
    } else if (newStatus === 'Done') {
      addNotification(w.userId, 'আপনার ৳' + w.amount + ' এর উইথড্র রিকোয়েস্ট সফলভাবে সম্পন্ন হয়েছে।', 'success');
    }
    database.ref('withdrawals/' + withdrawalId).update({ status: newStatus });
    showToast('উইথড্র স্ট্যাটাস আপডেট হয়েছে: ' + newStatus, 'success');
  }
}

function filterAdminUsers() {
  var q = document.getElementById('admin-user-search').value.toLowerCase();
  var rows = document.querySelectorAll('#admin-users-body tr');
  for (var i = 0; i < rows.length; i++) {
    var text = rows[i].textContent.toLowerCase();
    rows[i].style.display = text.indexOf(q) !== -1 ? '' : 'none';
  }
}

async function saveNewProduct() {
  if (isUploading) {
    showToast('আপলোড ইতিমধ্যে চলছে, অপেক্ষা করুন...', 'warning');
    return;
  }
  isUploading = true;
  
  var name = document.getElementById('np-name').value.trim();
  var category = document.getElementById('np-category').value;
  var stock = parseInt(document.getElementById('np-stock').value) || 0;
  var price = parseFloat(document.getElementById('np-price').value) || 0;
  var originalPrice = parseFloat(document.getElementById('np-original').value) || 0;
  var description = document.getElementById('np-desc').value.trim();
  var downloadable = document.getElementById('np-downloadable').checked;
  
  if (!name || !price || !originalPrice) { 
    showToast('নাম ও মূল্য দিন!', 'error'); 
    isUploading = false;
    return; 
  }
  
  showToast('আপলোড হচ্ছে... অপেক্ষা করুন', 'info');
  
  var newProduct = {
    id: Date.now(),
    name: name,
    category: category,
    price: price,
    originalPrice: originalPrice,
    stock: stock,
    image: 'https://via.placeholder.com/300x200?text=No+Image',
    video: '',
    rating: 4.0,
    reviews: [],
    description: description || name,
    downloadable: downloadable
  };
  
  try {
    var imageFile = document.getElementById('np-image-file');
    if (imageFile && imageFile.files && imageFile.files[0]) {
      var imageUrl = await uploadToImgBB(imageFile.files[0]);
      newProduct.image = imageUrl;
    } else {
      var imageUrl = document.getElementById('np-image').value.trim();
      if (imageUrl) newProduct.image = imageUrl;
    }
    
    var videoFile = document.getElementById('np-video-file');
    if (videoFile && videoFile.files && videoFile.files[0]) {
      var videoUrl = await uploadToImgBB(videoFile.files[0]);
      newProduct.video = videoUrl;
    } else {
      var videoUrl = document.getElementById('np-video').value.trim();
      if (videoUrl) newProduct.video = videoUrl;
    }
    
    await database.ref('products/' + newProduct.id).set(newProduct);
    
    notifyAllUsers('🎉 নতুন প্রোডাক্ট যোগ হয়েছে: ' + name + ' - ৳' + price, 'success');
    closeModal();
    showToast('প্রোডাক্ট সফলভাবে যোগ হয়েছে!', 'success');
    renderApp();
  } catch (error) {
    console.error('Error:', error);
    showToast('এরর: ' + error.message, 'error');
  } finally {
    isUploading = false;
  }
}

function renderNotifications() {
  var notifs = DEFAULT_DATA.notifications.filter(function(n) { return n && n.userId === state.currentUser.id; }).reverse();
  var html = '<p class="text-gray-500 text-center py-12">কোনো নোটিফিকেশন নেই</p>';
  if (notifs.length > 0) {
    html = '<div class="space-y-2">';
    for (var i = 0; i < notifs.length; i++) {
      var n = notifs[i];
      if (!n) continue;
      var icon = n.type === 'success' ? '✅' : (n.type === 'error' ? '❌' : '️');
      html += '<div class="bg-white rounded-xl p-4 shadow-sm border ' + (n.read ? 'border-gray-100' : 'border-l-4 border-l-indigo-500 border-gray-100') + ' flex items-start gap-3"><div class="text-2xl">' + icon + '</div><div class="flex-1"><p class="' + (n.read ? 'text-gray-600' : 'font-semibold text-gray-900') + '">' + (n.message || '') + '</p><p class="text-xs text-gray-400 mt-1">' + new Date(n.createdAt).toLocaleString() + '</p></div>' + (!n.read ? '<button type="button" onclick="markRead(' + n.id + ')" class="text-xs text-indigo-600 font-medium">পড়া</button>' : '') + '</div>';
    }
    html += '</div>';
  }
  return '<div class="fade-in"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-900">নোটিফিকেশন</h2><button type="button" onclick="markAllRead()" class="text-indigo-600 hover:underline text-sm font-medium">সব পড়া</button></div>' + html + '</div>';
}

function markRead(id) {
  var n = DEFAULT_DATA.notifications.find(function(x) { return x && x.id === id; });
  if (n) {
    n.read = true;
    database.ref('notifications/' + id).update({ read: true });
  }
  renderApp();
}

function markAllRead() {
  var notifs = DEFAULT_DATA.notifications.filter(function(n) { return n && n.userId === state.currentUser.id; });
  for (var i = 0; i < notifs.length; i++) {
    notifs[i].read = true;
    database.ref('notifications/' + notifs[i].id).update({ read: true });
  }
  showToast('সব নোটিফিকেশন পড়া হয়েছে', 'success');
  renderApp();
}

function addToCart(id) {
  var p = DEFAULT_DATA.products.find(function(x) { return x && x.id === id; });
  if (!p || p.stock === 0) return;
  var existing = state.cart.find(function(c) { return c.id === id; });
  if (existing) { existing.qty++; } else { state.cart.push({ id: id, qty: 1 }); }
  saveData();
  showToast('কার্টে যোগ হয়েছে!', 'success');
  renderApp();
}

function updateCartQty(id, delta) {
  var item = state.cart.find(function(c) { return c.id === id; });
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) state.cart = state.cart.filter(function(c) { return c.id !== id; });
  saveData();
  renderApp();
}

function removeFromCart(id) {
  state.cart = state.cart.filter(function(c) { return c.id !== id; });
  saveData();
  showToast('কার্ট থেকে সরানো হয়েছে', 'info');
  renderApp();
}

function toggleWishlist(id) {

  else { state.wishlist.push(id); showToast('উইশলিস্টে যোগ হয়েছে ❤️', 'success'); }

  renderApp();
}

function showCheckout() {
  showModal('<div class="p-6"><h2 class="text-2xl font-bold mb-4 text-gray-900">চেকআউট</h2><div class="space-y-4"><div><label class="block text-sm font-medium mb-1 text-gray-700">পেমেন্ট মেথড</label><select id="checkout-payment" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900"><option value="COD">ক্যাশ অন ডেলিভারি</option><option value="bKash">bKash</option><option value="Nagad">Nagad</option></select></div><div><label class="block text-sm font-medium mb-1 text-gray-700">অর্ডার নোট</label><textarea id="checkout-note" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-900" rows="2"></textarea></div></div><div class="flex gap-2 mt-6"><button type="button" onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-medium">বাতিল</button><button type="button" onclick="placeOrder()" class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold">কনফার্ম</button></div></div>');
}

function placeOrder() {
  var payment = document.getElementById('checkout-payment').value;
  var note = document.getElementById('checkout-note').value;
  var subtotal = 0;
  for (var i = 0; i < state.cart.length; i++) {
    var c = state.cart[i];
    var p = DEFAULT_DATA.products.find(function(x) { return x && x.id === c.id; });
    if (p) subtotal += p.price * c.qty;
  }
  var order = { 
    id: Date.now(), 
    userId: state.currentUser.id, 
    items: JSON.parse(JSON.stringify(state.cart)), 
    payment: payment, 
    note: note, 
    subtotal: subtotal, 
    shipping: 60, 
    total: subtotal + 60, 
    status: 'Pending', 
    createdAt: new Date().toISOString().split('T')[0] 
  };
  database.ref('orders/' + order.id).set(order);
  for (var j = 0; j < state.cart.length; j++) {
    var item = state.cart[j];
    var prod = DEFAULT_DATA.products.find(function(x) { return x && x.id === item.id; });
    if (prod) {
      prod.stock = Math.max(0, prod.stock - item.qty);
      database.ref('products/' + prod.id).update({ stock: prod.stock });
    }
  }
  state.cart = [];
  saveData();
  closeModal();
  showToast('অর্ডার সফল! 🎉 Admin Panel-এ দেখুন', 'success');
  addNotification(state.currentUser.id, 'অর্ডার #' + order.id + ' প্লেস হয়েছে!', 'success');
  renderApp();
}

function requestWithdraw() {
  var method = document.getElementById('withdraw-method').value;
  var amount = parseFloat(document.getElementById('withdraw-amount').value);
  var account = document.getElementById('withdraw-account').value.trim();
  if (!amount || amount <= 0) { showToast('সঠিক পরিমাণ দিন!', 'error'); return; }
  if (!account) { showToast('অ্যাকাউন্ট নম্বর দিন!', 'error'); return; }
  if (amount > state.currentUser.balance) { showToast('পর্যাপ্ত ব্যালেন্স নেই!', 'error'); return; }
  state.currentUser.balance -= amount;
  var u = DEFAULT_DATA.users.find(function(x) { return x && x.id === state.currentUser.id; });
  if (u) {
    u.balance = state.currentUser.balance;
    database.ref('users/' + u.id).update({ balance: u.balance });
  }
  var withdrawal = {
    id: Date.now(), 
    userId: state.currentUser.id, 
    method: method, 
    amount: amount, 
    account: account, 
    status: 'Pending', 
    date: new Date().toISOString().split('T')[0] 
  };
  database.ref('withdrawals/' + withdrawal.id).set(withdrawal);
  DEFAULT_DATA.transactions.push({ 
    id: Date.now(), 
    userId: state.currentUser.id, 
    type: 'উইথড্র রিকোয়েস্ট (' + method + ')', 
    amount: -amount, 
    date: new Date().toISOString().split('T')[0] 
  });
  addNotification(state.currentUser.id, '৳' + amount + ' উইথড্র রিকোয়েস্ট সফলভাবে পাঠানো হয়েছে (' + method + ')। অ্যাডমিন শীঘ্রই অনুমোদন করবে।', 'info');
  saveData();
  showToast('উইথড্র রিকোয়েস্ট পাঠানো হয়েছে!', 'success');
  renderApp();
}

function saveProfile() {
  var name = document.getElementById('prof-name').value.trim();
  var email = document.getElementById('prof-email').value.trim();
  var phone = document.getElementById('prof-phone').value.trim();
  var shopName = document.getElementById('prof-shop').value.trim();
  if (!name || !email || !phone) { showToast('সব তথ্য পূরণ করুন!', 'error'); return; }
  state.currentUser.name = name; 
  state.currentUser.email = email; 
  state.currentUser.phone = phone; 
  state.currentUser.shopName = shopName;
  var user = DEFAULT_DATA.users.find(function(u) { return u && u.id === state.currentUser.id; });
  if (user) { 
    user.name = name; 
    user.email = email; 
    user.phone = phone; 
    user.shopName = shopName;
    database.ref('users/' + user.id).update({
      name: name, email: email, phone: phone, shopName: shopName
    });
  }
  var oldPass = document.getElementById('prof-old-pass').value;
  var newPass = document.getElementById('prof-new-pass').value;
  if (oldPass || newPass) {
    if (oldPass !== state.currentUser.password) {
      showToast('বর্তমান পাসওয়ার্ড ভুল!', 'error');
      return;
    }
    if (newPass.length < 6) {
      showToast('নতুন পাসওয়ার্ড কমপক্ষে ৬ অক্ষর!', 'error');
      return;
    }
    state.currentUser.password = newPass;
    if (user) {
      user.password = newPass;
      database.ref('users/' + user.id).update({ password: newPass });
    }
    addNotification(state.currentUser.id, 'আপনার পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে।', 'info');
    showToast('পাসওয়ার্ড পরিবর্তন হয়েছে!', 'success');
  }
  saveData();
  showToast('প্রোফাইল আপডেট হয়েছে!', 'success');
  renderApp();
}

function toggleMobileMenu() {
  var menu = document.getElementById('mobile-menu');
  if (menu) menu.classList.toggle('hidden');
}

function scrollToSection(id) {
  state.currentView = 'home';
  renderApp();
  setTimeout(function() {
    var el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

function renderApp() {
  var app = document.getElementById('app');
  if (!state.currentUser) {
    if (state.currentView === 'login') app.innerHTML = renderLogin();
    else if (state.currentView === 'register') app.innerHTML = renderRegister();
    else app.innerHTML = renderHome();
  } else {
    app.innerHTML = renderDashboard();
  }
  window.scrollTo(0, 0);
}

loadData();
renderApp();
</script>
